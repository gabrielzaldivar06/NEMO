# Ollama CPU profile — layered on top of docker-compose.yml.
#
# Activate with:
#   docker compose -f docker-compose.yml -f docker-compose.ollama.yml up -d
#
# Or via the start script:
#   ./start.sh --ollama        (Linux/macOS)
#   .\start.ps1 -Ollama        (Windows PowerShell)
#
# What changes vs. default:
#   * Adds an `ollama` service that serves embeddings on the compose network.
#     Runs on CPU — no GPU required. Works on any machine including Mac ARM.
#   * A one-shot `ollama-init` job pulls the embedding model the first time.
#   * NEMO switches its embedding provider to `ollama` via env vars and waits
#     until `ollama` is healthy before starting.
#
# Trade-off vs. default fastembed:
#   * Better embedding quality (nomic-embed-text 768D vs MiniLM 384D).
#   * Slower on CPU for the first requests; subsequent ones benefit from
#     Ollama's internal model cache.
#   * Adds ~1-2 min on first start while the model is pulled (~274 MB).

services:
  ollama:
    image: ollama/ollama:latest
    container_name: nemo-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: nemo-ollama-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "[ollama-init] pulling ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}…"
        OLLAMA_HOST=http://ollama:11434 ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
        echo "[ollama-init] done."
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  nemo:
    environment:
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

volumes:
  ollama-models:
    name: nemo-ollama-models
