# GPU profile — layered on top of docker-compose.yml.
#
# Activate with:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# What changes vs. default:
#   * Adds an `ollama` service (official image) that serves embeddings on the
#     compose network. GPU passthrough via `deploy.resources.reservations.devices`
#     (requires the NVIDIA Container Toolkit on the host).
#   * A one-shot `ollama-init` job pulls the embedding model the first time.
#   * NEMO switches its embedding provider to `ollama` via env vars and waits
#     until `ollama` is healthy before starting.
#
# No NVIDIA GPU? Remove the `deploy` block under `ollama`. Ollama falls back to
# CPU automatically — slower, but still functional.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: nemo-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]

  ollama-init:
    image: ollama/ollama:latest
    container_name: nemo-ollama-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "[ollama-init] pulling ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}…"
        OLLAMA_HOST=http://ollama:11434 ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
        echo "[ollama-init] done."
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  nemo:
    environment:
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

volumes:
  ollama-models:
    name: nemo-ollama-models
