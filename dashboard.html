or", "vlox-babylon"], "created": "2026-03-22", "content": "DVE MultiBuffer use-after-dispose GPU buffer bug FIX (2026-03-22):\n\nROOT CAUSE: In DVEBRSectionMeshesMultiBuffer.updateVertexData(), a pre-cleanup block (lines 109-118) disposed mesh.metadata.buffer and released geometry BEFORE calling DVEBRVoxelMesh.UpdateVertexDataBuffers. But UpdateVertexDataBuffers has its own _meshBuffers WeakMap tracking the same buffer. On fast path (same vertex count), upd"}, {"id": "4f777d68-15ce-4caf-898a-b904fc6557a7", "mtype": "known_unknown", "importance": 9, "color": "#607d8b", "excerpt": "KNOWN_UNKNOWN: El número exacto de pelos de cualquier animal individual es un da…", "tags": ["pelos-exactos", "dato-hiperspecifico"], "created": "2026-03-22", "content": "KNOWN_UNKNOWN: El número exacto de pelos de cualquier animal individual es un dato hiperespecífico que no existe en ninguna fuente verificable."}, {"id": "5bd270ed-6a3f-44ad-b357-3d9d647d5b62", "mtype": "known_unknown", "importance": 9, "color": "#607d8b", "excerpt": "KNOWN_UNKNOWN: El contenido de mensajes privados de personas concretas es inacce…", "tags": ["mensajes-privados", "privacidad"], "created": "2026-03-22", "content": "KNOWN_UNKNOWN: El contenido de mensajes privados de personas concretas es inaccesible — información privada fuera de alcance."}, {"id": "4d81df3a-67ec-4e2a-8486-e8e9dc36aca2", "mtype": "known_unknown", "importance": 9, "color": "#607d8b", "excerpt": "KNOWN_UNKNOWN: El resultado de las elecciones presidenciales de EE.UU. en 2028 e…", "tags": ["elecciones-2028", "futuro", "prediccion"], "created": "2026-03-22", "content": "KNOWN_UNKNOWN: El resultado de las elecciones presidenciales de EE.UU. en 2028 es imposible de conocer — evento futuro."}, {"id": "1555849c-96f8-4b07-8acf-bcf9b0108c14", "mtype": "technical_discovery", "importance": 9, "color": "#607d8b", "excerpt": "DVE bufferMode default is 'multi' — SingleBuffer is DEAD CODE. The default buffe…", "tags": ["DVE", "renderer", "bufferMode", "MultiBuffer", "SingleBuffer", "dead-code", "architecture", "critical-discovery"], "created": "2026-03-22", "content": "DVE bufferMode default is 'multi' — SingleBuffer is DEAD CODE. The default bufferMode in EngineSettings.types.ts (line 17) is 'multi', not 'single'. DVEBabylonRenderer constructor (DVEBabylonRenderer.ts lines 67-80) creates DVEBRSectionMeshesMultiBuffer when bufferMode != 'single' (the default case). DVEBRSectionMeshesSingleBuffer is effectively dead code unless explicitly overridden. Any renderer"}, {"id": "0600529a-e695-45c2-a3ca-c62f13cf2435", "mtype": "knowledge", "importance": 9, "color": "#607d8b", "excerpt": "DVE Debugging Patterns and Pitfalls (learned 2026-03-22)\n\n1. WORKER ERRORS ARE S…", "tags": ["DVE", "debugging", "patterns", "pitfalls", "webpack", "workers", "SharedMemory", "threads"], "created": "2026-03-22", "content": "DVE Debugging Patterns and Pitfalls (learned 2026-03-22)\n\n1. WORKER ERRORS ARE SILENT: @amodx/threads has NO .catch() on async task handlers. If a task throws in the worker, the promise on the main thread NEVER resolves. The editor's applyInFlight flag stays true forever → all clicks ignored. Always check worker console separately.\n\n2. WEBPACK + DIST GOTCHA: demos/Vlox webpack aliases point to pac"}, {"id": "f119f689-08aa-4fba-9816-f4f48d574cc7", "mtype": "knowledge", "importance": 9, "color": "#607d8b", "excerpt": "DVE Architecture: Paint/Erase Data Flow (verified 2026-03-22)\n\nFULL FLOW (Shared…", "tags": ["DVE", "architecture", "paint", "erase", "data-flow", "threads", "applyInFlight", "VoxelBuildSpace", "VoxelGameplayEditor"], "created": "2026-03-22", "content": "DVE Architecture: Paint/Erase Data Flow (verified 2026-03-22)\n\nFULL FLOW (SharedMemory mode):\n1. VoxelGameplayEditor: pointerdown → beginStroke → queueApply → apply()\n2. apply() calls this.space.pick() → runTaskAsync(\"pick-voxel\") → PickVoxelWorld\n3. Then calls this.space.paintVoxel([x,y,z], voxel) or this.space.eraseVoxel([x,y,z])\n4. VoxelBuildSpace._updateFunctions[\"paint-voxel\"] → this.DVER.thr"}, {"id": "fc424f81-f327-4615-aedb-1f0fe96c3334", "mtype": "technical_decision", "importance": 9, "color": "#607d8b", "excerpt": "DVE Editor Bug Debug Session — Phase 9 (2026-03-22)\n\nPROBLEM: Paint and erase vo…", "tags": ["DVE", "editor", "paint", "erase", "bug", "Phase9", "isInProgress", "SimulationSector", "tickUpdate"], "created": "2026-03-22", "content": "DVE Editor Bug Debug Session — Phase 9 (2026-03-22)\n\nPROBLEM: Paint and erase voxels completely non-functional in editor. User reports \"no hace nada, no puedo borrar ni pintar nuevos voxeles\".\n\nROOT CAUSE FOUND: The Phase 8 `isInProgress()` guard added to `SimulationSector.tickUpdate()` was preventing sections from being re-queued for rebuild after paint/erase operations. When a section had `isInP"}, {"id": "511a7c83-7f4f-4a4d-9298-76aed9805543", "mtype": "personal", "importance": 9, "color": "#607d8b", "excerpt": "El usuario se llama Gabriel.", "tags": ["nombre", "identidad", "usuario"], "created": "2026-03-22", "content": "El usuario se llama Gabriel."}, {"id": "ffcb2b56-6ba7-4862-b56b-36b2873495e6", "mtype": "project", "importance": 9, "color": "#607d8b", "excerpt": "## DVE Editor - Estado completo de bugs post-Phase 8 (2026-03-22)\n\n### Todos los…", "tags": ["dve", "editor", "bugs", "complete-status", "phase3-8", "verified"], "created": "2026-03-22", "content": "## DVE Editor - Estado completo de bugs post-Phase 8 (2026-03-22)\n\n### Todos los bugs corregidos (Fases 3-8):\n\n**Phase 3**: SimulationBrush.ts - 4 unsafe inline tag lookups → getBehaviorForVoxelId ✅\n**Phase 4**: 7 bugs - PaintVoxelData.Create (secondaryStateString), PickVoxel (delta), PaintVoxelData.FromRaw (getLevelState), ToRaw/Populate (secondaryVoxelId ternary), VoxelPlacingStrategy.getState ("}, {"id": "ab985f11-8e0d-4143-be9e-cc4ff398c0bd", "mtype": "technical", "importance": 9, "color": "#607d8b", "excerpt": "## DVE Editor Phase 8 - Root Cause Fixes Applied\n\n### Bug 1 (CRITICAL): LockSect…", "tags": ["dve", "editor", "bugfix", "phase8", "LockSectors", "concurrent-build", "race-condition", "InitTasks", "SimulationSector"], "created": "2026-03-22", "content": "## DVE Editor Phase 8 - Root Cause Fixes Applied\n\n### Bug 1 (CRITICAL): LockSectors was locking WRONG sectors\n**File**: packages/vlox/src/Builder/World/InitTasks.ts\n**Problem**: `buildAreaBounds = new BoundingBox()` initialized to (0,0,0)→(0,0,0). All paint-voxel, erase-voxel, surface-selection, bfs-selection, and path tasks used this default bounds, meaning LockSectors always locked sectors aroun"}, {"id": "3d5f99a5-3c91-456a-9f20-5858af0fb63c", "mtype": "project", "importance": 9, "color": "#607d8b", "excerpt": "## DVE Editor - Archivos modificados en Fases 5-7 (estado actual 2026-03-22)\n\n##…", "tags": ["DVE", "editor", "modified-files", "phase5", "phase6", "phase7", "current-state"], "created": "2026-03-22", "content": "## DVE Editor - Archivos modificados en Fases 5-7 (estado actual 2026-03-22)\n\n### demos/Vlox/src/VoxelGameplayEditor.ts\n- Fase 5: paintVoxel/paintTemplate usan normalPosition (no position)\n- Fase 6: Guards de deduplicación en beginStroke/endStroke para evitar cascade\n- Contiene código muerto: shouldUseStructuredSolidEditing + applyStructuredSolidEdit definidos pero NUNCA llamados desde apply()\n- W"}, {"id": "7aef810d-61f4-4888-9d70-9dddbe24a284", "mtype": "project", "importance": 9, "color": "#607d8b", "excerpt": "## DVE Editor Paint Bug - Investigación Completa (Fases 5-7)\n\n**Bug original**: …", "tags": ["DVE", "editor", "paint-bug", "terrain-disappearing", "phase5", "phase6", "phase7", "fix-summary"], "created": "2026-03-22", "content": "## DVE Editor Paint Bug - Investigación Completa (Fases 5-7)\n\n**Bug original**: \"cuando intento colocar terreno o agua, simplemente un gran trozo del terreno previo desaparece\"\n\n**Repo**: C:\\dev\\dev5\\DivineVoxelEngine\n**Demo**: demos/Vlox, servidor webpack en puerto 9006\n**Build**: webpack usa aliases a /dist (NO /src). Para compilar cambios: `cd packages/vlox/src && npx tsc -b` y `cd packages/vlo"}, {"id": "ad8deda8-2cb1-484e-9bcf-c4ee3d6f0fbf", "mtype": "technical_decision", "importance": 9, "color": "#607d8b", "excerpt": "SPRINT 1 COMPLETADO — Proactive Context + Token Efficiency (commit 405197e / mer…", "tags": ["sprint1", "completado", "proactive-context", "prime_context", "compact", "mcp-resources", "first-call-injection"], "created": "2026-03-22", "content": "SPRINT 1 COMPLETADO — Proactive Context + Token Efficiency (commit 405197e / merge 39db391)\n\nBranch: dev/sprint1 (mergeado desde SUB-BETA1)\nFecha: 2026-03-22\nArchivos: ai_memory_core.py (+99 líneas), ai_memory_mcp_server.py (+130 líneas)\n\nFEATURES IMPLEMENTADAS Y VERIFICADAS:\n\nT1 — Descriptions prescriptivas: search_memories/prime_context/get_reminders ahora dicen CUÁNDO llamarlas. Elimina overhea"}, {"id": "22884c78-0c29-4c01-8f48-88eb82324a37", "mtype": "diagnostic", "importance": 9, "color": "#607d8b", "excerpt": "Phase 6 BUG REPORT - Terrain disappears when placing voxels (2026-03-21):\nUser r…", "tags": ["DVE", "editor", "terrain-disappear", "Phase6", "bug"], "created": "2026-03-21", "content": "Phase 6 BUG REPORT - Terrain disappears when placing voxels (2026-03-21):\nUser reports: \"cuando intento colocar terreno o agua, simplemente un gran trozo del terreno previo desaparece\"\nPrevious session fixes:\n1. Paint cascade bug fixed in VoxelGameplayEditor.ts (beginStroke/endStroke dedup guards, requestAnimationFrame yield, picked.position added to strokeEditedPositions)\n2. Paint now correctly t"}, {"id": "77256dbf-04b4-4d52-ac5c-73a08f922d70", "mtype": "diagnostic", "importance": 9, "color": "#607d8b", "excerpt": "Phase 6 - Flickering Root Cause & Fix (2026-03-22):\n\nROOT CAUSE: Paint cascade b…", "tags": ["DVE", "editor", "flickering", "paint-cascade", "Phase6", "fix"], "created": "2026-03-21", "content": "Phase 6 - Flickering Root Cause & Fix (2026-03-22):\n\nROOT CAUSE: Paint cascade bug in VoxelGameplayEditor.ts\n- queueApply while loop + pick() returning updated results after each paint created runaway cascade\n- beginStroke() clears strokeEditedPositions and lastPaintKey unconditionally, even while applyInFlight is true\n- Multiple rapid pointerdown events during active paint would reset dedup state"}, {"id": "b70b93b5-1c57-42d1-82c7-287c7a1fda97", "mtype": "lessons_learned", "importance": 9, "color": "#607d8b", "excerpt": "## DVE Debugging Lessons & Anti-Patterns (March 2026)\n\n### Lesson 1: storeLight=…", "tags": ["DVE", "debugging", "lessons", "anti-patterns", "storeLight", "levelState", "boundary", "long-term"], "created": "2026-03-21", "content": "## DVE Debugging Lessons & Anti-Patterns (March 2026)\n\n### Lesson 1: storeLight=false causes cascading template overwrites\nCreateFullTemplate defaults storeLight=false. This means ALL template light values are 0. When ReplaceVoxelTemplate compares world vs template, EVERY lit voxel is detected as \"changed\" (previousRaw[1] != raw[1]). This causes massive unnecessary overwrites of 125 positions for "}, {"id": "a9b75ede-e52d-459c-b445-0da0120ebe3f", "mtype": "task_progress", "importance": 9, "color": "#607d8b", "excerpt": "## DVE Editor Bug Fix History — All Phases (March 2026)\n\n### Phase 4 Fixes (7 bu…", "tags": ["DVE", "bug-fixes", "Phase4", "Phase5", "modified-files", "build-commands", "medium-term"], "created": "2026-03-21", "content": "## DVE Editor Bug Fix History — All Phases (March 2026)\n\n### Phase 4 Fixes (7 bugs across 5 files) — ALL DEPLOYED in dist/\n1. **PaintVoxelData.Create parameter order** — Fixed to match constructor\n2. **PaintVoxelData.ToRaw secondary ternary** — Fixed secondary ID resolution\n3. **PaintVoxelData.FromRaw level** — Fixed to use VoxelLevelReader.getLevel(raw[2])\n4. **PickVoxel.ts delta computation** — "}, {"id": "e57cbcca-3f36-42ae-8903-05559f816fc3", "mtype": "knowledge", "importance": 9, "color": "#607d8b", "excerpt": "## Coordenadas y Renderizado de Overlays — Referencia Técnica\n\n### Sistema de Co…", "tags": ["coordenadas", "normalizacion", "svg", "overlay", "imagebounds", "aspect-ratio", "bbox"], "created": "2026-03-21", "content": "## Coordenadas y Renderizado de Overlays — Referencia Técnica\n\n### Sistema de Coordenadas Fracture AI\nTodas las coordenadas están NORMALIZADAS [0, 1]:\n- **bbox**: `{x, y, width, height}` — esquina superior-izquierda + dimensiones\n- **anchor**: `{x, y}` — centro del bbox\n- **contentBounds**: `{x, y, w, h}` — bounds del CAM heatmap\n\n### Flujo de Coordenadas\n1. **YOLOv8**: Produce coordenadas pixeles"}, {"id": "88416727-599f-4708-91e5-d56642030711", "mtype": "knowledge", "importance": 9, "color": "#607d8b", "excerpt": "## RAD IA PLATFORM — API Routes y Python Gateways\n\n### API Routes (src/app/api/)…", "tags": ["api-routes", "python-gateway", "modelos-ia", "env-vars", "subprocess"], "created": "2026-03-21", "content": "## RAD IA PLATFORM — API Routes y Python Gateways\n\n### API Routes (src/app/api/)\n- `/api/ai/fracture-overlay` — POST → ejecuta scripts/fracture_overlay_infer.py como subprocess\n- `/api/ai/chest-xray-overlay` — POST → chest X-ray analysis\n- `/api/ai/analyze` — POST → análisis general IA\n- `/api/studies/` — CRUD estudios DICOM\n- `/api/auth/` — NextAuth endpoints\n- `/api/reports/` — Reportes radiológ"}, {"id": "f19375a4-b96f-4913-b96f-5c1a286d3e67", "mtype": "knowledge", "importance": 9, "color": "#607d8b", "excerpt": "## Cornerstone.js Event Handling — Lección Clave\n\n### Problema Resuelto\nCualquie…", "tags": ["cornerstone", "events", "data-ui-control", "react", "nativo", "patron", "viewport"], "created": "2026-03-21", "content": "## Cornerstone.js Event Handling — Lección Clave\n\n### Problema Resuelto\nCualquier componente UI (slider, botón, panel) DENTRO del div `viewportRef` de Cornerstone.js tiene sus eventos interceptados por los listeners nativos del viewport.\n\n### Por qué React stopPropagation NO funciona:\n1. Cornerstone registra handlers via `element.addEventListener('wheel/touch*', handler, options)` NATIVAMENTE\n2. R"}, {"id": "b7c5e0d1-90de-4dea-979b-ec737402af1d", "mtype": "knowledge", "importance": 9, "color": "#607d8b", "excerpt": "## Historial de Bugs y Fixes — Fracture AI (operativo)\n\n### Hotfix Ronda 1 (5 ca…", "tags": ["fracture-ai", "bugs", "fixes", "historial", "hotfix", "limitaciones", "debug"], "created": "2026-03-21", "content": "## Historial de Bugs y Fixes — Fracture AI (operativo)\n\n### Hotfix Ronda 1 (5 cambios):\n1. CONFIDENCE_THRESHOLD: 0.25 → 0.10 (fracture_overlay_infer.py L52)\n2. Otsu floor: 0.15 → 0.10 (L286, luego 0.10 → 0.05 en ronda 2)\n3. TTA boost: +5%/max15% → +8%/max25% (L551)\n4. YOLO bbox bypass: findings con bbox nunca se descartan (L739)\n5. UI sensitivity default: 0.5 → 0.8 (DicomViewerFixed.tsx L1278)\n\n##"}, {"id": "e5c8fb7c-9c5b-4c3b-bc09-3120c10ad785", "mtype": "achievement", "importance": 9, "color": "#607d8b", "excerpt": "## Fracture AI: Slider Event Fix + CAM Localization + Dual-Region (Round 2)\n\n###…", "tags": ["fracture-ai", "slider-fix", "cam-localization", "dual-region", "cornerstone-events", "data-ui-control", "grad-cam"], "created": "2026-03-21", "content": "## Fracture AI: Slider Event Fix + CAM Localization + Dual-Region (Round 2)\n\n### Bug 1: Slider STILL scrolling image (resolved properly)\n**Root Cause**: React synthetic `stopPropagation()` cannot prevent native `addEventListener` handlers from firing on the same element. Cornerstone.js viewport has native `wheel`/`touchstart`/`touchmove` listeners registered via `addEventListener` on `viewerElemen"}, {"id": "1053f885-68ab-4640-a85b-27db2da0a18d", "mtype": "skill", "importance": 9, "color": "#607d8b", "excerpt": "DVE Editor Architecture — Key file map and data flow for VoxelGameplayEditor int…", "tags": ["DVE", "architecture", "editor", "VoxelGameplayEditor", "VoxelBuildSpace", "PaintVoxelData", "BrushTool", "PickVoxel", "tasks", "templates", "file-map"], "created": "2026-03-21", "content": "DVE Editor Architecture — Key file map and data flow for VoxelGameplayEditor interaction:\n\nEDITOR FILES:\n- demos/Vlox/src/VoxelGameplayEditor.ts (712 lines) — Main editor: keyboard/pointer events, queueApply() coalescing, apply() dispatch, shouldUseStructuredSolidEditing(), applyStructuredSolidEdit(), getStructuredEditBounds(), rewriteSolidSurfaceLevels()\n- packages/vlox/src/Builder/VoxelBuildSpac"}, {"id": "6f2b2655-d085-40a2-9481-402871347d70", "mtype": "skill", "importance": 9, "color": "#607d8b", "excerpt": "Phase 4 editor deep audit on DivineVoxelEngine — Found and fixed 7 bugs preventi…", "tags": ["DVE", "editor", "phase-4-audit", "PaintVoxelData", "PickVoxel", "VoxelPlacingStrategy", "BrushTool", "VoxelGameplayEditor", "bugfix", "interaction"], "created": "2026-03-21", "content": "Phase 4 editor deep audit on DivineVoxelEngine — Found and fixed 7 bugs preventing natural editor interaction:\n\nBUG 1 (FIXED): PaintVoxelData.Create() line 22 — passed `data.secondaryModString` instead of `data.secondaryStateString` as last constructor arg. Constructor expects (id, name, state, stateString, mod, modString, level, levelState, secondaryVoxelId, secondaryName, secondaryMod, secondary"}, {"id": "22c8c8a8-226a-4427-a2d8-18d6ab364c07", "mtype": "skill", "importance": 9, "color": "#607d8b", "excerpt": "DVE editor fix session 2: Six bugs fixed with production quality.\n\n1. ReplaceVox…", "tags": ["DivineVoxelEngine", "editor", "power-propagation", "SimulationBrush", "ReplaceVoxelTemplate", "EraseVoxelTemplate", "bug-fix", "production"], "created": "2026-03-21", "content": "DVE editor fix session 2: Six bugs fixed with production quality.\n\n1. ReplaceVoxelTemplate.ts — Added power propagation (both PowerRemove for old voxels with power, and updatePowerTask+PowerUpdate for new logic-affecting voxels). This was CRITICAL because replaceTemplate is the primary editor paint path.\n\n2. EraseVoxelTemplate.ts — Added power removal: captures voxel.getPower() before : "#607d8b", "excerpt": "Sprint de Mejoras Fracture AI — COMPLETADO (33/33 tests pasados)\n\n6 mejoras impl…", "tags": ["fracture-ai", "improvements", "mura", "otsu", "tta", "nms", "sensitivity-slider", "sprint-complete"], "created": "2026-03-20", "content": "Sprint de Mejoras Fracture AI — COMPLETADO (33/33 tests pasados)\n\n6 mejoras implementadas y verificadas:\n\n1. MURA DenseNet-169 Weights: Modelo entrenado con train_mura_densenet.py (batch-size 4, 500 train samples, 100 val, 3 epochs head + 5 finetune). Checkpoint: models/fracture/mura_densenet169.pth (48.6 MB). Activado en .env.local FRACTURE_DENSENET_WEIGHTS. Precisión val: 99-100%.\n\n2. Otsu Adapt"}, {"id": "2291f34f-5291-430d-8a86-3b227e199579", "mtype": "preference", "importance": 9, "color": "#a855f7", "excerpt": "El idioma preferido del usuario es español. Todas las respuestas, explicaciones,…", "tags": ["idioma", "preferencia", "español", "comunicación"], "created": "2026-03-20", "content": "El idioma preferido del usuario es español. Todas las respuestas, explicaciones, comentarios de código y comunicación deben ser en español."}, {"id": "6023669b-87b2-472f-8cb3-5310fc40dd94", "mtype": "skill", "importance": 9, "color": "#607d8b", "excerpt": "## MAGNOLIA — CONFIGURACIÓN Y ENV VARS\n\n### next.config.js\n- reactStrictMode: fa…", "tags": ["magnolia", "config", "env", "tailwind", "nextconfig"], "created": "2026-03-20", "content": "## MAGNOLIA — CONFIGURACIÓN Y ENV VARS\n\n### next.config.js\n- reactStrictMode: false (Cornerstone WebGL stability)\n- compress: true, poweredByHeader: false\n- serverActions: bodySizeLimit=50mb, maxDuration=300s (5min AI timeout)\n- optimizePackageImports: lucide-react, @radix-ui/*\n- images: storage.googleapis.com, *.googleusercontent.com\n- webpack: .wasm asset/resource, client fs/path disabled, Corne"}, {"id": "4b73a524-480b-47dd-b385-d82d2f365574", "mtype": "skill", "importance": 9, "color": "#607d8b", "excerpt": "## MAGNOLIA — DEPENDENCIAS COMPLETAS (package.json)\n\n# 2026-03-25 for DivineVoxelEngine AAA water: DVEWaterMaterial…", "tags": ["DVE", "DivineVoxelEngine", "water", "AAA", "Sprint5", "SSFR", "shader", "hybrid-bridge"], "created": "2026-03-25", "content": "Sprint 5 kickoff on 2026-03-25 for DivineVoxelEngine AAA water: DVEWaterMaterialPlugin now reconstructs a first SSFR-style local fluid surface from hybrid bridge fields. The shader derives local fluid event energy from dynamic/flow masks, reconstructs a smoothed local thickness field, reconstructs a local event normal from that thickness, and composites it into the continuous patch water shading. "}, {"id": "24a9805a-29e1-4215-af65-dfdb58200004", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "Sprint 4 kickoff: the Babylon water runtime now uses an explicit local-fluid sol…", "tags": ["DVE", "DivineVoxelEngine", "water", "AAA", "Sprint4", "PBF", "MLS-MPM"], "created": "2026-03-25", "content": "Sprint 4 kickoff: the Babylon water runtime now uses an explicit local-fluid solver gate with PBF as the default path, while MLS-MPM remains available as a fallback backend. The hybrid bridge no longer assumes MLS-MPM-only startup."}, {"id": "7e7aae23-1f46-4184-905c-130ad5dfe81e", "mtype": "preference", "importance": 8, "color": "#a855f7", "excerpt": "El usuario pidió continuar en el siguiente sprint para alinearnos con el plan de…", "tags": ["DVE", "DivineVoxelEngine", "water", "AAA", "Sprint4", "NEMO"], "created": "2026-03-25", "content": "El usuario pidió continuar en el siguiente sprint para alinearnos con el plan de agua AAA, manteniendo uso constante de NEMO."}, {"id": "6b03a0c7-66dd-46b5-8c61-87c17d4ecb58", "mtype": "preference", "importance": 8, "color": "#a855f7", "excerpt": "El usuario pidió limpiar duplicados y código sobrante antes de seguir con el pla…", "tags": ["DVE", "DivineVoxelEngine", "cleanup", "water", "NEMO"], "created": "2026-03-25", "content": "El usuario pidió limpiar duplicados y código sobrante antes de seguir con el plan, y guardar el a enruta shoreBand de masas grandes por patch-preview y el hash warp subcelda del mesher ya escala con warpStrength; aun asi Sunlit Beach sigue mostrando bandas brillantes periodicas en renderer classic, asi que el bloqueo dominante ya no parece solo de routing sino tambien de shading/material visible."}, {"id": "5171d070-7324-4ec5-b920-6259618e335f", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "Sunlit Beach visual validation on 2026-03-25 required a higher shoreline benchma…", "tags": ["DivineVoxelEngine", "DVE", "water", "validation", "AAA", "SunlitBeach"], "created": "2026-03-25", "content": "Sunlit Beach visual validation on 2026-03-25 required a higher shoreline benchmark camera; once re-framed, the baseline classic scene still showed strongly striped/grid-owned water, so Sprint 2 remains visually misaligned with the AAA large-mass target."}, {"id": "c8c7e7a0-d82b-44f2-8427-d462ba379430", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "2026-03-25 Sprint 2 implementation milestone: largeWaterVisibleMode now gates br…", "tags": ["DVE", "DivineVoxelEngine", "water", "Sprint2", "WaterPatchMeshSystem", "largeWaterVisibleMode"], "created": "2026-03-25", "content": "2026-03-25 Sprint 2 implementation milestone: largeWaterVisibleMode now gates broad openSurface routing in the visible water mesher. When set to patch-preview, large openSurface patches selected by patchId bounds plus largeBodyField signal go through the new WaterPatchMeshSystem selection path, while small openSurface areas fall back to legacy and shoreBand/channelRibbon/wallContact/dropEdge remai"}, {"id": "d11e9014-3ad2-4ae6-9946-182f178d549b", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "2026-03-25 Sprint 1 base for the new water AAA hybrid plan is now implemented in…", "tags": ["DVE", "DivineVoxelEngine", "water", "AAA", "patch-mesh", "hybrid-bridge"], "created": "2026-03-25", "content": "2026-03-25 Sprint 1 base for the new water AAA hybrid plan is now implemented in code. Water extraction and GPU transport now emit explicit per-section patch contracts via patchSummaryBuffer, patchMetadata, and columnPatchIndex, derived from existing patchState data. The Babylon hybrid bridge consumes those patch summaries to bias target flow direction, flow strength, turbulence, shore influence, "}, {"id": "5c4a1dfd-2724-4791-a77a-ca66084f861c", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "2026-03-25 shader refinement from external GLSL article review: only the normali…", "tags": ["DVE", "DivineVoxelEngine", "water", "shader", "voronoi", "screen-space", "flowmap"], "created": "2026-03-25", "content": "2026-03-25 shader refinement from external GLSL article review: only the normalized screen-space coordinate idea was worth integrating. DVEWaterMaterialPlugin now uses normalized screen UV as a subtle glint/specular foam modulator while keeping Voronoi base patterns world-anchored to avoid camera-locked foam. The same pass also advects water normal-map UVs with the hybrid flow texture so normals, "}, {"id": "a6270dfa-d136-4ace-ba6d-9630ff079fe7", "mtype": "preference", "importance": 8, "color": "#a855f7", "excerpt": "User requested on 2026-03-25 replacing ugly point/circle foam with a Voronoi fra…", "tags": ["DVE", "DivineVoxelEngine", "water", "foam", "voronoi", "shader"], "created": "2026-03-25", "content": "User requested on 2026-03-25 replacing ugly point/circle foam with a Voronoi fractal approach, explicitly asking to research resources and adapt it to the current hybrid water plan."}, {"id": "ac8fe073-b0fa-4b29-a900-7ddb8b140775", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "2026-03-25 implementation advance: DVEWaterHybridBridge moved beyond section sta…", "tags": ["DVE", "DivineVoxelEngine", "water", "hybrid", "simulation", "Babylon", "clipmap"], "created": "2026-03-25", "content": "2026-03-25 implementation advance: DVEWaterHybridBridge moved beyond section stamping into a persistent clipmap field simulation. It now reconstructs target fill/flow/turbulence/shore fields from section gpuData, shifts live fields when the clip rec enters, runs fixed simulation substeps with advection, relaxation, pressure-like equalization, and foam persistence, then packs the result back into b"}, {"id": "4c238479-fa4b-410a-8846-93dbbe1d82c6", "mtype": "preference", "importance": 8, "color": "#a855f7", "excerpt": "User requested on 2026-03-25 to continue implementation aggressively toward real…", "tags": ["DVE", "DivineVoxelEngine", "water", "hybrid", "NEMO", "implementation"], "created": "2026-03-25", "content": "User requested on 2026-03-25 to continue implementation aggressively toward real advanced fluid simulation and to keep recovering/registering progress in NEMO constantly."}, {"id": "62f34cbc-5190-4317-b922-f17e3b173904", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "User explicitly requested on 2026-03-25 to implement the three next hybrid water…", "tags": ["DVE", "DivineVoxelEngine", "water", "hybrid", "priority", "clipmap", "padded"], "created": "2026-03-25", "content": "User explicitly requested on 2026-03-25 to implement the three next hybrid water steps in parallel: camera-centered clipmap, split base/dynamic hybrid textures, and padded-column continuity. Treat this as the active execution priority, not a planning note."}, {"id": "22bafa2c-6401-47aa-a530-d52116f76d23", "mtype": "procedure", "importance": 8, "color": "#06d6a0", "excerpt": "Sprint agresivo vigente para DVE water híbrida: 1) crear bridge GPU en vlox-baby…", "tags": ["DVE", "DivineVoxelEngine", "water", "hybrid-architecture", "sprint-plan", "GPU-bridge"], "created": "2026-03-25", "content": "Sprint agresivo vigente para DVE water híbrida: 1) crear bridge GPU en vlox-babylon que consuma WaterSectionGrid.gpuData, 2) subir column/padded/metadata/particleSeed buffers a GPU, 3) producir una primera salida visual útil sin readback, preferiblemente masks de foam/agitation/damping, 4) integrarla a DVEWaterMaterialPlugin manteniendo el mesher actual como fallback y validar en Vlox."}, {"id": "d2fdf0e2-6f51-4668-be3f-842eab0d0325", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "El repo matsuoka-601/WebGPU-Ocean valida para DivineVoxelEngine una ruta híbrida…", "tags": ["DVE", "DivineVoxelEngine", "water", "WebGPU", "MLS-MPM", "SSFR", "hybrid-architecture"], "created": "2026-03-25", "content": "El repo matsuoka-601/WebGPU-Ocean valida para DivineVoxelEngine una ruta híbrida GPU-first viable en navegador: MLS-MPM en WebGPU para fluido local/dinámico y Screen-Space Fluid Rendering como capa visual. Lo más transferible no es su demo completa sino tres patrones: 1) simulador desacoplado que escribe particleBuffer y posvelBuffer, 2) renderer SSFR separado que consume solo posiciones/velocidad"}, {"id": "d7964bb6-535c-49a7-b523-04a9cdc9ca3e", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "For DVE water, the most ambitious browser-feasible GPU-first direction beyond pa…", "tags": ["DVE", "DivineVoxelEngine", "water", "GPU", "WebGPU", "SSFR"], "created": "2026-03-25", "content": "For DVE water, the most ambitious browser-feasible GPU-first direction beyond patch meshing is WebGPU particle/hybrid simulation plus screen-space fluid rendering. External refs validated: Babylon has an official fluid renderer based on Simon Green SSFR with depth, thickness, bilateral blur, normals, Fresnel, Beer-law and optional velocity-to-foam; recent WebGPU examples achieve real-time browser "}, {"id": "c98fb299-ca29-4a9d-93e3-c932290d4f0b", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "Water topology replacement target: abandoning unit-square/unit-sheet water requi…", "tags": ["DVE", "DivineVoxelEngine", "water", "topology", "WaterSurfaceMesher"], "created": "2026-03-25", "content": "Water topology replacement target: abandoning unit-square/unit-sheet water requires replacing three coupled contracts, not just tweaking surface deformation. (1) Data contract: WaterColumnSample/WaterSectionGrid still model water as one top surface per (x,z) column with optional support layers. (2) Meshing contract: meshWaterSurfaceSubset iterates every filled column and prepares one cell-local su"}, {"id": "4db2f5f5-454d-44a1-b0cc-ab842c234e54", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "For WaterSurfaceMesher retrieval, compact structural memories outperform storing…", "tags": ["DVE", "DivineVoxelEngine", "WaterSurfaceMesher", "debug", "embeddings"], "created": "2026-03-25", "content": "For WaterSurfaceMesher retrieval, compact structural memories outperform storing the full raw source in NEMO. The highest-signal facts are: active path is dedicated water mesher not LiquidGeometryNode; topology is still per-cell; CPU->GPU contract depends on prepared vertex payloads and seam emission; prepareWaterCellRenderData is the new debug/refactor boundary. Raw full-file dumps are likely low"}, {"id": "12b814c0-d467-4850-a6aa-430b7fc0c176", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "DVE water shader: dveBaseUV (UVs de objeto 0-1 por quad) NO debe usarse para el …", "tags": ["DVE", "DivineVoxelEngine", "water", "UV", "GLSL", "shader", "DVEWaterMaterialPlugin"], "created": "2026-03-24", "content": "DVE water shader: dveBaseUV (UVs de objeto 0-1 por quad) NO debe usarse para el sample de la textura voxel. Causa grid visible (1 tile por celda). Usar siempre vPositionW.xz * (1.0/16.0) como worldUV en el fragment shader para que la textura tile continuamente a través de las fronteras de sección."}, {"id": "ecc2b582-9d30-4939-8536-2800da4194d8", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "DVE water sector-level grid root cause: WATER_PADDED_RADIUS was 2 but the Catmul…", "tags": ["DVE", "DivineVoxelEngine", "water", "section-boundary", "padded-radius", "grid-artifact", "WaterStateExtractor"], "created": "2026-03-24", "content": "DVE water sector-level grid root cause: WATER_PADDED_RADIUS was 2 but the Catmull-Rom spline boundary cells need 3 columns of padding. The spline samples lx+xOffset-1 (offset 0-3) and each sample calls sampleCornerLocalSurfaceY with WATER_CORNER_SAMPLE_RADIUS=2 (window of 4 columns). Outermost reach from a boundary cell: 16+2+1=19 needs padded column at offset +3 but only +2 was available. Missing"}, {"id": "171064b6-373e-4f84-bcc6-bebe230854fb", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "Water grid squares fix (WaterSurfaceMesher.ts): applyWaterMesherProfile applied …", "tags": ["DVE", "DivineVoxelEngine", "WaterSurfaceMesher", "water", "grid", "coastline", "applyWaterMesherProfile", "vertex-sharing"], "created": "2026-03-24", "content": "Water grid squares fix (WaterSurfaceMesher.ts): applyWaterMesherProfile applied per-column displacement to shared corner vertices. Three sources of discontinuity: (1) dampingBlend lerp toward per-column dampedTargetY, (2) column-center-relative flow coordinates with sign flip at boundaries, (3) per-column bottom floor clamp. Fixed with: getColumnDampedCornerY + sampleCornerDampedY averaging fully-"}, {"id": "db1c31ef-029c-4064-972a-200aec06d0ae", "mtype": "episodic", "importance": 8, "color": "#48cae4", "excerpt": "Sprint 1 del replan de agua AAA en DivineVoxelEngine se inicio en codigo el 2026…", "tags": ["DVE", "DivineVoxelEngine", "water", "sprint-1", "render-state"], "created": "2026-03-24", "content": "Sprint 1 del replan de agua AAA en DivineVoxelEngine se inicio en codigo el 2026-03-24. Se agregaron contratos estructurados WaterEdgeState, WaterPatchState y WaterRenderState; WaterColumnSample ahora incluye renderState; y WaterStateExtractor rellena metadatos provisionales de edge/patch/render sin romper compatibilidad con WaterSurfaceMesher. Validacion: diagnosticos sin errores en archivos edit"}, {"id": "44820da2-f4af-48d3-bd71-e490db30ca2f", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "Segunda ola de investigacion externa 2026-03-24 para DivineVoxelEngine agua AAA:…", "tags": ["DVE", "DivineVoxelEngine", "water", "AAA", "wetness", "foam", "shoreline", "research"], "created": "2026-03-24", "content": "Segunda ola de investigacion externa 2026-03-24 para DivineVoxelEngine agua AAA: el plan debe incorporar cuatro requisitos adicionales verificados en fuentes web modernas. (1) anti-periodicidad para superficies amplias mediante sintesis aperiódica y campos de direccion de ola; (2) shorelines guiadas con campos/caches/deformers en vez de derivarlas solo del mesh; (3) wetness persistente con spread,"}, {"id": "18a6b8c6-c924-494b-a030-7223da634578", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "Investigacion externa 2026-03-24 para DivineVoxelEngine agua AAA: las fuentes co…", "tags": ["DVE", "DivineVoxelEngine", "water", "research", "AAA", "wetness", "erosion", "evaporation"], "created": "2026-03-24", "content": "Investigacion externa 2026-03-24 para DivineVoxelEngine agua AAA: las fuentes convergen en que el siguiente salto no viene de seguir afinando un solo WaterSurfaceMesher, sino de introducir water-state extraction mas rica, separar geometria por situacion visual, y añadir wetness/moisture/sediment fields para que el agua moje, se evapore, erosione y alimente el entorno. Documento creado: docs/water-"}, {"id": "77eda3fd-d762-463c-b5c3-a1b56cddc346", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "Plan ambicioso de replanteamiento arquitectonico del agua AAA agregado el 2026-0…", "tags": ["DVE", "DivineVoxelEngine", "water", "architecture", "AAA", "plan", "NEMO"], "created": "2026-03-24", "content": "Plan ambicioso de replanteamiento arquitectonico del agua AAA agregado el 2026-03-24 en docs/water-aaa-architectural-replan-2026-03-24.md. La direccion fija ya no es mas tuning del WaterSurfaceMesher monolitico, sino reconstruir Layer B y Layer C con extraccion rica de render-state (edgeType, patchType, thickness, dropHeight, wallContactFactor, turbulence, foamPotential, wetnessPotential, waterBod"}, {"id": "0c134a5f-8b68-49fd-b1a6-3f456ace01bb", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "Refinado visual adicional del agua aplicado el 2026-03-24: WaterSurfaceMesher ya…", "tags": ["DVE", "DivineVoxelEngine", "water", "mesher", "seams", "visual", "AAA"], "created": "2026-03-24", "content": "Refinado visual adicional del agua aplicado el 2026-03-24: WaterSurfaceMesher ya no usa una base lateral plana por columna para los seams. Ahora samplea seam bases suavizadas por esquina usando columnas vecinas y comprime el borde con bottom Y interpolado por extremo del tramo. Esto reduce el look de plancha rígida en canales estrechos y laderas, complementando el gating previo de supportLayers/la"}, {"id": "0910a618-5302-401b-9c20-d51b6d282066", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "Validacion de runtime 2026-03-24: tras el ajuste contra cortinas visuales del ag…", "tags": ["DVE", "DivineVoxelEngine", "water", "dist", "build", "mesher", "supportLayers"], "created": "2026-03-24", "content": "Validacion de runtime 2026-03-24: tras el ajuste contra cortinas visuales del agua, build:packages y build del demo pasaron correctamente y se verifico en dist que WaterStateExtractor exige profundidad minima + gap fuerte para supportLayers y que WaterSurfaceMesher solo usa layered seams cuando hay suficiente fill, pendiente y baja apertura lateral; en los demas casos vuelve a seams adaptativos si"}, {"id": "f44fa2f8-4a47-43ce-ad6a-c324bbc40c3a", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "Ajuste visual de agua aplicado el 2026-03-24 tras revisar screenshot del demo: W…", "tags": ["DVE", "DivineVoxelEngine", "water", "mesher", "supportLayers", "visual", "shoreline"], "created": "2026-03-24", "content": "Ajuste visual de agua aplicado el 2026-03-24 tras revisar screenshot del demo: WaterStateExtractor ahora solo captura supportLayers cuando hay profundidad suficiente y una discontinuidad vertical fuerte real; WaterSurfaceMesher ahora desactiva layered seams para agua somera, abierta o de pendiente suave y vuelve a seams adaptativos simples en esos casos. Este ajuste ataca especificamente el artefa"}, {"id": "7c27db55-a2f9-4546-aa80-2dad01853584", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "Feedback visual del usuario/validacion 2026-03-24: en la captura del demo el agu…", "tags": ["DVE", "DivineVoxelEngine", "water", "visual", "mesher", "supportLayers", "shoreline"], "created": "2026-03-24", "content": "Feedback visual del usuario/validacion 2026-03-24: en la captura del demo el agua sigue viendose mal principalmente por geometria de representacion. Se observan tiras colgantes y paredes laterales estratificadas demasiado visibles en laderas, con aspecto de laminas/curtains en vez de masa continua. Esto indica que la ruta supportLayers + layered seams esta sobre-emitiendo geometria lateral expuest"}, {"id": "06dfc2f6-a776-4753-ba4d-2b69ca063684", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "DivineVoxelEngine water pipeline advanced on 2026-03-24 in two parallel directio…", "tags": ["DVE", "DivineVoxelEngine", "water", "mesher", "extractor", "AAA", "geometry"], "created": "2026-03-24", "content": "DivineVoxelEngine water pipeline advanced on 2026-03-24 in two parallel directions: WaterStateExtractor now captures additional vertical supportLayers per water column (beyond top surface + supportDepth), and WaterSurfaceMesher now uses those layers to emit layered exposed seams while also applying geometry-side crest displacement on the top surface. This is the current aggressive AAA-oriented ren"}, {"id": "cfe0a4df-1997-4461-9c84-833864b20684", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "Rediseño geométrico ambicioso del agua aplicado el 2026-03-24 en DivineVoxelEngi…", "tags": ["DVE", "DivineVoxelEngine", "water", "AAA", "mesher", "geometry", "rendering"], "created": "2026-03-24", "content": "Rediseño geométrico ambicioso del agua aplicado el 2026-03-24 en DivineVoxelEngine: WaterSurfaceMesher ya no emite solo 1 quad por columna. Ahora subdivide adaptativamente la tapa del agua segun pendiente/orilla/apertura y segmenta los seams laterales para seguir esa topologia. Base técnica: malla más densa donde la pendiente rompe la ilusión y uso de geometría dinámica/custom vertex data compatib"}, {"id": "21332729-b504-4aec-a889-e9bb6d4af37c", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "Lectura de HUD reportada por el usuario tras la instrumentacion hidrologica (202…", "tags": ["DVE", "DivineVoxelEngine", "water", "hydrology", "HUD", "diagnostics", "mesher", "solver"], "created": "2026-03-24", "content": "Lectura de HUD reportada por el usuario tras la instrumentacion hidrologica (2026-03-24): diagonalSpills = 0-1-2-0, lateralEqualizations = 30-80-30, terraceHoldCandidates = 0-2-4-0. Interpretacion operativa: el solver si esta redistribuyendo lateralmente de forma significativa mientras los derrames diagonales son escasos y los terrace holds son bajos a moderados. Esto inclina el diagnostico hacia "}, {"id": "37a1d132-dc13-47b1-946a-d703b0f245ee", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "DVE water slope seam fix (2026-03-24): persistent viscous/stratified water again…", "tags": ["DVE", "DivineVoxelEngine", "water", "mesher", "slopes", "seams", "rendering", "shoreline"], "created": "2026-03-24", "content": "DVE water slope seam fix (2026-03-24): persistent viscous/stratified water against solid slopes was partly caused by WaterSurfaceMesher emitting every visible seam down to full voxel baseY. On shores and sloped solid boundaries this created hanging vertical sheets and empty gaps between terrace layers. Fix: compress seam bottom depth per edge using shore distance, fill factor, edge slope, and boun"}, {"id": "65c951ae-5f02-4c8f-b054-295d8260327f", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "DVE water-solid interface fix (2026-03-24): residual holes/grid artifacts at sol…", "tags": ["DVE", "DivineVoxelEngine", "water", "rendering", "shader", "mesher", "grazing-angle", "solids"], "created": "2026-03-24", "content": "DVE water-solid interface fix (2026-03-24): residual holes/grid artifacts at solid interfaces were mostly a rendering issue, not solver state. Two causes: 1) seam quads in WaterSurfaceMesher were marked too open (`Math.max(openEdgeFactor, 0.5)`), which reduced edge masking/foam where water meets solids; 2) DVEWaterMaterialPlugin intersection foam depended too much on screen-space thickness and fai"}, {"id": "0e902392-7676-4278-aa1e-f04d8e438321", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "DVE hydrology edge-stickiness fix (2026-03-24): residual viscous behavior near s…", "tags": ["DVE", "DivineVoxelEngine", "water", "hydrology", "LiquidVoxelBehavior", "shoreline"], "created": "2026-03-24", "content": "DVE hydrology edge-stickiness fix (2026-03-24): residual viscous behavior near solids/coasts was not primarily a mass-distribution bug but a wake-up gating issue in LiquidVoxelBehavior.needUpdate. Low exposed edge cells could stop updating too early because only myLevel>1 or same-liquid gap>=2 woke them; allowing exposed edge cells to keep updating when a higher same-liquid neighbor is still feedi"}, {"id": "d5557228-3d37-47f9-ba03-7f41590f5798", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "DVE shoreline water integration fix (2026-03-24): two separate issues made coast…", "tags": ["DVE", "DivineVoxelEngine", "water", "shoreline", "sea", "integration", "solver", "render"], "created": "2026-03-24", "content": "DVE shoreline water integration fix (2026-03-24): two separate issues made coastal water feel wrong after solver stabilization. 1) Shoreline viscosity: preserving the first lateral remainder in the source even when opening into air made edge water cling near solids; fix by only reserving source remainder when all lateral targets are already filled, plus a 1-level shoreline deadband in LiquidVoxelB"}, {"id": "71891c5d-cced-47a9-b507-1274e68c8b66", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "DVE water oscillation fix (2026-03-24): persistent 'convulsing' after lateral eq…", "tags": ["DVE", "DivineVoxelEngine", "water", "hydrology", "oscillation", "solver", "stability"], "created": "2026-03-24", "content": "DVE water oscillation fix (2026-03-24): persistent 'convulsing' after lateral equalization came from distributing the remainder mass to neighbors in a way that depended on which voxel processed the tick, so the extra unit bounced between equally valid cells. Stabilization: in local lateral equalization, assign the first remainder unit to the current voxel before distributing any extras to neighbor"}, {"id": "9863e2eb-bd20-4281-9cad-009bee147743", "mtype": "insight", "importance": 8, "color": "#ff9f1c", "excerpt": "DVE liquid mound regression (2026-03-24): fixing directional bias alone was not …", "tags": ["DVE", "DivineVoxelEngine", "water", "hydrology", "mound-regression", "solver"], "created": "2026-03-24", "content": "DVE liquid mound regression (2026-03-24): fixing directional bias alone was not enough. The repeated 1-unit lateral transfer model was too conservative and let source voxels retain too much mass, reintroducing semisolid-looking water mounds that only flattened slowly. Better fix: local lateral mass equalization across source plus eligible neighbors, while keeping a minimal source reserve only when"}, {"id": "e1c29006-d78b-4a3a-8d04-7906693be628", "mtype": "fact", "importance": 8, "color": "#00b4d8", "excerpt": "DVE liquid solver directional-bias fix (2026-03-24): the head-driven multi-neigh…", "tags": ["DVE", "DivineVoxelEngine", "water", "hydrology", "solver", "directional-bias"], "created": "2026-03-24", "content": "DVE liquid solver directional-bias fix (2026-03-24): the head-driven multi-neighbor redistribution initially removed the old hashed neighbor rotation and processed ties in a fixed cardinal order, causing apparent one-direction flow on flat surfaces. Fix: restore rotated neighbor ordering and distribute lateral transfers in repeated 1-unit passes across all eligible neighbors."}, {"id": "cb9d4cc4-c17a-4a36-a0b8-63aa0a44611e", "mtype": "technical_fix", "importance": 8, "color": "#607d8b", "excerpt": "DivineVoxelEngine water static mound fix (2026-03-24): in packages/vlox/src/Worl…", "tags": ["DVE", "water", "editor", "LiquidVoxelUpdate", "levelState", "static-mound"], "created": "2026-03-24", "content": "DivineVoxelEngine water static mound fix (2026-03-24): in packages/vlox/src/WorldSimulation/Voxels/Ticks/Types/LiquidVoxelUpdate.ts, elevated liquid-cap collapse must apply to ANY lone liquid voxel above the same liquid body, not only levelState===1. The editor paints water as levelState=0, so limiting collapse to sources/flowing voxels leaves raised 'gelatin mountain' caps static on top of water "}, {"id": "b9cd2ddc-54a4-467a-9cbd-fab9d3e896d4", "mtype": "validation_test", "importance": 8, "color": "#607d8b", "excerpt": "Validation test memory for system verification", "tags": ["validation", "test", "system_check"], "created": "2026-03-23", "content": "Validation test memory for system verification"}, {"id": "7a45dd69-b47c-44ed-977c-8d07311bbd22", "mtype": "preference", "importance": 8, "color": "#a855f7", "excerpt": "User prefers detailed technical explanations with code examples", "tags": ["communication", "technical", "preferences"], "created": "2026-03-23", "content": "User prefers detailed technical explanations with code examples"}, {"id": "b723377a-93ff-4f01-b187-b0e64c19a885", "mtype": "technical", "importance": 8, "color": "#607d8b", "excerpt": "packages/magic + magic-quantum — TECHNICAL REFERENCE (22 marzo 2026)\n\n═══ @divin…", "tags": ["DVE", "magic", "magic-quantum", "magicvoxel", "vox-parser", "dual-contouring", "webgpu", "ray-marching", "technical-reference"], "created": "2026-03-22", "content": "packages/magic + magic-quantum — TECHNICAL REFERENCE (22 marzo 2026)\n\n═══ @divinevoxel/magic (v0.0.52) ═══\nPURPOSE: MagicVoxel .vox file parser + dual contouring mesh generator\nDEPENDENCY: @divinevoxel/core (OBSOLETE package name)\nFILES: 3 source files (index.ts, VoxParser.ts, DualContouring.ts)\n\nVoxParser.ts:\n- parse() → reads VOX header + MAIN chunk\n- readHeader() → validates \"VOX \" magic string"}, {"id": "db3584c8-4da7-4593-bdad-31636f0d3de8", "mtype": "technical_reference", "importance": 8, "color": "#607d8b", "excerpt": "DVE Demo Server Startup - Verified Working Method (2026-03-22):\n- Background ter…", "tags": ["DVE", "demo", "server", "startup", "webpack", "npm", "terminal-workaround"], "created": "2026-03-22", "content": "DVE Demo Server Startup - Verified Working Method (2026-03-22):\n- Background terminals always start from workspace root (c:\\dev\\dev5\\DivineVoxelEngine), NOT from foreground terminal's cwd\n- The run_in_terminal tool strips `cd` and `Set-Location` commands from background commands\n- WORKING METHOD: Use `npm --prefix c:\\dev\\dev5\\DivineVoxelEngine\\demos\\Vlox start` to run from any directory\n- Alternat"}, {"id": "6262527f-d226-4e17-bf13-59ec25b080c8", "mtype": "architecture", "importance": 8, "color": "#607d8b", "excerpt": "DVE Demo Architecture — Key Configuration Points (2026-03-22):\n\nRENDER PIPELINE …", "tags": ["DVE", "demo-architecture", "renderer-pipeline", "terrain-generation", "configuration", "WorldGen", "brushAPI", "scene-registration", "MultiBuffer"], "created": "2026-03-22", "content": "DVE Demo Architecture — Key Configuration Points (2026-03-22):\n\nRENDER PIPELINE CONFIGURATION:\n- Demo.ts controls renderer selection. editableSceneIds Set forces classic renderer via shouldForceStableEditableRenderer.\n- To allow PBR on a scene: DO NOT add it to editableSceneIds.\n- To enable water flow: add scene to hydrologySceneIds Set OR check requestedBenchmarkSceneId === \"scene-id\" in enableHy"}, {"id": "5230a3d3-6188-41ad-9575-8d7ca062822c", "mtype": "analysis", "importance": 8, "color": "#607d8b", "excerpt": "DVE editor-sandbox vs island scenario analysis (2026-03-22):\n\nWHY \"island\" scene…", "tags": ["DVE", "editor-sandbox", "island", "PBR", "classic-renderer", "editableSceneIds", "benchmark", "definitivo", "performance-analysis"], "created": "2026-03-22", "content": "DVE editor-sandbox vs island scenario analysis (2026-03-22):\n\nWHY \"island\" scene with \"definitivo\" benchmark works better than \"editor-sandbox\":\n\n1. RENDERER: \"editor-sandbox\" was in editableSceneIds → Demo.ts forced classic renderer (shouldForceStableEditableRenderer). \"island\" is NOT in editableSceneIds → PBR renderer with experimental features works.\n\n2. EDITOR STARTUP: editableSceneIds scenes "}, {"id": "7f6633b2-3904-4370-bfae-d3a8c619de9a", "mtype": "task_context", "importance": 8, "color": "#607d8b", "excerpt": "Nueva fase de trabajo: ejecutar pruebas E2E, endurecer conversacion natural/pers…", "tags": ["nemo-assist", "e2e", "voice", "conversation", "tools"], "created": "2026-03-22", "content": "Nueva fase de trabajo: ejecutar pruebas E2E, endurecer conversacion natural/persona, tools diarias y voz bidireccional en NEMO ASSIST. Se permite iterar, corregir errores y buscar soluciones en internet."}, {"id": "4632321b-8966-478b-a853-a3cb4cb81da6", "mtype": "project_update", "importance": 8, "color": "#607d8b", "excerpt": "En NEMO ASSIST se mitigó la degradación conversacional por timeout de LM Studio …", "tags": ["nemo-assist", "lm-studio", "brain-router", "fallback", "timeout", "context-filtering"], "created": "2026-03-22", "content": "En NEMO ASSIST se mitigó la degradación conversacional por timeout de LM Studio ajustando el cerebro para no enviar tool catalog ni tool_choice en turnos claramente conversacionales o con imagen adjunta, y filtrando respuestas genéricas previas del asistente fuera del contexto reciente usado por el brain y el fallback conversacional."}, {"id": "606b93df-f627-4db8-b317-3a90842a4d70", "mtype": "technical_decision", "importance": 8, "color": "#607d8b", "excerpt": "DVE Phase 3-8 Bug Fix Summary (all verified present 2026-03-22)\n\nPhase 8 fixes (…", "tags": ["DVE", "bug-fixes", "Phase3-8", "Phase9", "LockSectors", "BoundingBox", "isInProgress", "history"], "created": "2026-03-22", "content": "DVE Phase 3-8 Bug Fix Summary (all verified present 2026-03-22)\n\nPhase 8 fixes (most recent):\n1. LockSectors buildAreaBounds fix: Changed 7 tasks in InitTasks.ts from using shared `buildAreaBounds` (always at origin 0,0,0) to per-task local BoundingBox at actual voxel position. Affected tasks: paint-voxel, erase-voxel, paint-voxel-path, erase-voxel-path, get-voxel-surface-selection, get-voxel-bfs-"}, {"id": "97531200-e946-450c-915e-fa9085bb9b8d", "mtype": "project", "importance": 8, "color": "#607d8b", "excerpt": "## DVE Build Commands - Referencia rápida\n\n### Para compilar cambios en el engin…", "tags": ["DVE", "build", "commands", "webpack", "typescript", "quick-reference"], "created": "2026-03-22", "content": "## DVE Build Commands - Referencia rápida\n\n### Para compilar cambios en el engine:\n```powershell\n# Paquete vlox (mesher, tasks, world, etc.)\ncd c:\\dev\\dev5\\DivineVoxelEngine\\packages\\vlox\\src\nnpx tsc -b\n\n# Paquete vlox-babylon (renderer, materials, scene)\ncd c:\\dev\\dev5\\DivineVoxelEngine\\packages\\vlox-babylon\\src\nnpx tsc -b\n```\n\n### Para correr el demo:\n```powershell\ncd c:\\dev\\dev5\\DivineVoxelEngi"}, {"id": "418233f6-0480-41dc-96ee-ac5177ab4254", "mtype": "project", "importance": 8, "color": "#607d8b", "excerpt": "## DVE Paint Pipeline - Arquitectura completa (referencia rápida)\n\n### Pipeline …", "tags": ["DVE", "architecture", "paint-pipeline", "mesh-rebuild", "surfacenets", "reference"], "created": "2026-03-22", "content": "## DVE Paint Pipeline - Arquitectura completa (referencia rápida)\n\n### Pipeline de Paint (mundo worker):\nVoxelBuildSpace.paintVoxel() → world worker \"paint-voxel\" → LockSectors(location, buildAreaBounds) → SimulationBrush.paint() → PaintVoxel() → updateArea() → markDisplayDirty() → UnLockSectors\n\n### Pipeline de Mesh Rebuild:\nSimulationSector.tickUpdate() → detecta displayDirty tick change → World"}, {"id": "989382af-75c4-4236-b310-e5c6b4770655", "mtype": "decision", "importance": 8, "color": "#607d8b", "excerpt": "NEMO ASSIST brain local en LM Studio con modelo multimodal Q8: aunque soporte 40…", "tags": ["NEMO-ASSIST", "LM-Studio", "context-length", "brain", "performance", "decision"], "created": "2026-03-22", "content": "NEMO ASSIST brain local en LM Studio con modelo multimodal Q8: aunque soporte 40000 de contexto, la recomendacion operativa por defecto para el agente es 24576 como punto de equilibrio entre estabilidad, latencia y espacio para system prompt + herramientas + memoria reciente. Usar 16384 para modo rapido/voz y subir a 32768-40000 solo en casos excepcionales como analisis de imagen complejo o docume"}, {"id": "21a53de5-3503-4a8a-bd30-270756281277", "mtype": "architecture", "importance": 8, "color": "#607d8b", "excerpt": "## Diseño conceptual — IA que aprende con NEMO (Sprint 3 candidato)\n\nDiscutido e…", "tags": ["sprint3", "aprendizaje", "diseño", "feedback-loop", "NEMO"], "created": "2026-03-22", "content": "## Diseño conceptual — IA que aprende con NEMO (Sprint 3 candidato)\n\nDiscutido el 2026-03-22. El usuario quiere explorar un sistema de aprendizaje continuo sobre NEMO.\n\n**4 mecanismos faltantes identificados:**\n1. **Refuerzo** — `rate_response(session_id, score)` que ajuste importance_level de memorias usadas\n2. **Generalización** — consolidación nocturna que detecte patrones entre memorias y cree"}, {"id": "159e2977-fa34-40b6-a43c-95b55b304a3f", "mtype": "technical_decision", "importance": 8, "color": "#607d8b", "excerpt": "SPRINT1 — ANÁLISIS: LLM proactivo con NEMO (ahorro de tokens)\n\nPROBLEMA: El LLM …", "tags": ["sprint1", "token-optimization", "proactive-context", "mcp", "prime_context", "compact-format"], "created": "2026-03-22", "content": "SPRINT1 — ANÁLISIS: LLM proactivo con NEMO (ahorro de tokens)\n\nPROBLEMA: El LLM hace 3-4 tool calls exploratorias por sesión para recuperar contexto, gastando ~1200 tokens en respuestas JSON con campos inútiles (embeddings, UUIDs, database_path).\n\nSOLUCIÓN 1 — Tool prime_context (2-3h):\n- Una sola llamada al inicio de conversación en lugar de 3-4\n- Devuelve memories de alta importancia + recordato"}, {"id": "7f48b00b-9cca-48aa-af01-040244de3fb3", "mtype": "achievement", "importance": 8, "color": "#607d8b", "excerpt": "## Fracture Post-Hotfix Bug Fixes (2 bugs)\n\n### Bug 1: Sensitivity Slider Scroll…", "tags": ["fracture-ai", "bugfix", "slider", "localization", "densenet", "cam-bbox", "event-propagation"], "created": "2026-03-21", "content": "## Fracture Post-Hotfix Bug Fixes (2 bugs)\n\n### Bug 1: Sensitivity Slider Scrolling Image Instead of Adjusting\n**Root Cause**: `<input type=\"range\">` in FractureOverlayPanel.tsx had NO event isolation. It sits inside Cornerstone.js viewportRef div which has wheel/touchstart/touchmove listeners. Dragging slider bubbled events to viewport causing image pan/scroll.\n\n**Fix**: Added `onPointerDown`, `o"}, {"id": "a67081e3-8344-4de3-82bd-731800ee8d4e", "mtype": "skill", "importance": 8, "color": "#607d8b", "excerpt": "Phase 3 editor audit on DivineVoxelEngine — Found and fixed 1 crash bug (4 insta…", "tags": ["DVE", "editor", "SimulationBrush", "erase", "behavior-dispatch", "phase-3-audit", "crash-fix"], "created": "2026-03-21", "content": "Phase 3 editor audit on DivineVoxelEngine — Found and fixed 1 crash bug (4 instances) in SimulationBrush.ts:\n\nBUG: erase(), eraseAsync(), eraseTemplate(), eraseTemplateAsync() used an UNSAFE inline tags lookup `tags[\"dve_simulation_behavior\"]` that crashes with TypeError on tagless non-air voxels. Meanwhile paint methods already used `tags?.[\"dve_simulation_behavior\"]` and eraseSelection/erasePath"}, {"id": "eb90209d-8d7e-4c72-94f3-7ed3555d2a1b", "mtype": "skill", "importance": 8, "color": "#607d8b", "excerpt": "DivineVoxelEngine Vlox editor/root cause: cuando el gameplay editor pinta sobre …", "tags": ["DivineVoxelEngine", "Vlox", "editor", "replaceTemplate", "paintTemplate", "SimulationBrush", "terrain-material", "nemo"], "created": "2026-03-20", "content": "DivineVoxelEngine Vlox editor/root cause: cuando el gameplay editor pinta sobre voxels existentes, la ruta correcta es replaceTemplate para preservar secondary/material y ejecutar ciclo erase/paint correcto; paintTemplate solo es segura para free placement en aire. Además, SimulationBrush.paintTemplate/eraseSelection debe resolver el behavior usando el voxel real en la celda, no this.data.id stale"}, {"id": "4fd36495-6425-43d0-beca-a443071d1ba2", "mtype": "skill", "importance": 8, "color": "#607d8b", "excerpt": "El demo Vlox debe operarse desde demos/Vlox. El build validado es `npm run build…", "tags": ["DivineVoxelEngine", "Vlox", "build", "dev-server", "demo-directory"], "created": "2026-03-20", "content": "El demo Vlox debe operarse desde demos/Vlox. El build validado es `npm run build` dentro de `demos/Vlox`, que primero recompila `vlox` y `vlox-babylon` mediante `build:packages` y luego genera el bundle del demo con webpack. Para el servidor de desarrollo, el comando correcto desde la raíz del repo es `npm --prefix .\\\\demos\\\\Vlox run dev`; el dev server queda en el puerto 9002."}, {"id": "dc87932d-22bc-43d3-8976-0736238d27da", "mtype": "technical", "importance": 8, "color": "#607d8b", "excerpt": "## TotalSegmentator + MPR Viewer — Bug Audit & Fixes (Junio 2025)\n\n### Archivos …", "tags": ["totalsegmentator", "mpr-viewer", "anatomy-map", "performance", "bug-fix", "nifti", "streaming", "polling"], "created": "2026-03-20", "content": "## TotalSegmentator + MPR Viewer — Bug Audit & Fixes (Junio 2025)\n\n### Archivos modificados\n- `src/app/api/ai/anatomy-map/route.ts` (~3700 LOC)\n- `src/components/mpr/MPRLab.tsx` (~4000 LOC)\n\n### Bugs API corregidos (anatomy-map/route.ts)\n1. **Instance ordering bug** — `ensureSeriesInputDirectory()` copiaba DICOMs sin ordenar por `instanceNumber`, causando slices desordenados → segmentación incorre"}, {"id": "bd793f8a-5346-4f8a-8700-cfa095d0fcb4", "mtype": "technical", "importance": 8, "color": "#607d8b", "excerpt": "## Sprint 1 Quick Wins - Completado (5/5)\n\n### 1. Validación de env vars (src/li…", "tags": ["sprint-1", "quick-wins", "env-validation", "permissions", "logger", "pino", "pagination"], "created": "2026-03-20", "content": "## Sprint 1 Quick Wins - Completado (5/5)\n\n### 1. Validación de env vars (src/lib/validators/env.ts) — NUEVO\n- Schema Zod para todas las vars del servidor\n- En producción lanza error fatal si faltan DATABASE_URL o NEXTAUTH_SECRET\n- En dev solo imprime warning\n- Helpers: getRequiredEnv(), getEnvOrDefault()\n\n### 2. Permisos centralizados (src/lib/auth/permissions.ts) — NUEVO\n- 14 Sets exportados: CL"}, {"id": "df0e8280-5a76-41cc-a4bd-caaa36f70211", "mtype": "fact", "importance": 7, "color": "#00b4d8", "excerpt": "El threshold de deduplicación semántica es 0.92", "tags": ["nemo", "dedup"], "created": "2026-03-27", "content": "El threshold de deduplicación semántica es 0.92"}, {"id": "b959c19c-9680-4384-842f-f1adb24f7cb8", "mtype": "fact", "importance": 7, "color": "#00b4d8", "excerpt": "El endpoint de embeddings primario es http://localhost:1234/v1/embeddings", "tags": ["nemo", "config"], "created": "2026-03-27", "content": "El endpoint de embeddings primario es http://localhost:1234/v1/embeddings"}, {"id": "5735ab1e-5b8c-480e-a976-86187ef79e54", "mtype": "fact", "importance": 7, "color": "#00b4d8", "excerpt": "DVEWaterMaterialPlugin vertex shader perf pass (2026-03-26). Changes to DVEWater…", "tags": ["DVE", "DivineVoxelEngine", "water", "shader", "performance", "vertex"], "created": "2026-03-26", "content": "DVEWaterMaterialPlugin vertex shader perf pass (2026-03-26). Changes to DVEWaterMaterialPlugin.ts:\n1. dveGetVertexWaveDisplacement: removed 2 extra domain warp passes (saves 2× dveGetWaterPatternWarp), removed localHash (saves 2× dveValueNoise), removed phaseG/H + detailAmp1/2 (saves 2 sin/cos), removed noiseDetail (saves 1 noise), removed Gerstner lateral noise (saves 2 noise). Domain is now posi"}, {"id": "d39aa983-7f59-41e1-9737-7841253147aa", "mtype": "fact", "importance": 7, "color": "#00b4d8", "excerpt": "DVE water 5-point structural audit (session 2026): All 5 seam sources for open w…", "tags": ["DVE", "DivineVoxelEngine", "water", "seam", "shader", "mesher"], "created": "2026-03-26", "content": "DVE water 5-point structural audit (session 2026): All 5 seam sources for open water investigated.\n1. Border vertex sync — RESOLVED. WATER_PADDED_RADIUS=3. All derived metadata (flow, renderState, patchState, shoreDistance) computed for padded exterior cells. Corner averaging uses same 4 world cells from both sections.\n2. Per-cell discrete data — RESOLVED for open water. All vertex height function"}, {"id": "8480e069-7046-41a3-985c-c4bd31d319fc", "mtype": "fact", "importance": 7, "color": "#00b4d8", "excerpt": "WaterSurfaceMesher.ts — seam refactor + dead code removal (March 26 2026, same s…", "tags": ["DVE", "DivineVoxelEngine", "WaterSurfaceMesher", "seam", "refactor"], "created": "2026-03-26", "content": "WaterSurfaceMesher.ts — seam refactor + dead code removal (March 26 2026, same session)\n\nDead code removed (8 functions): getMesherProfileForSample, getSurfaceInteriorFade,\ngetWaterSurfaceWarpDirection, sampleWarpedInterpolatedPoint, computeHeightfieldWaterNormal,\ncomputeTriangleNormal, blendWaterNormals, alignWaterNormal\n\nSeam dispatch refactor:\n- SEAM_MODE_DROP=0, SEAM_MODE_LAYERED=1, SEAM_MODE_"}, {"id": "4ea2497e-2e57-4850-82df-79161705b460", "mtype": "fact", "importance": 7, "color": "#00b4d8", "excerpt": "Antes de continuar Sprint 3 se limpió duplicación real en DVEWaterMaterialPlugin…", "tags": ["DVE", "DivineVoxelEngine", "cleanup", "shader", "patch-aware"], "created": "2026-03-25", "content": "Antes de continuar Sprint 3 se limpió duplicación real en DVEWaterMaterialPlugin: la lógica patch-aware repetida fue movida a helpers GLSL compartidos sin cambiar comportamiento. Validado con npx tsc -b en packages/vlox-babylon/src."}, {"id": "220c2cba-f3d5-4dfa-b507-5d5e5bc7b726", "mtype": "procedure", "importance": 7, "color": "#06d6a0", "excerpt": "Sprint water hybrid follow-up 2026-03-25: next implementation target is to evolv…", "tags": ["DVE", "DivineVoxelEngine", "water", "hybrid", "babylon", "gpuData", "procedure"], "created": "2026-03-25", "content": "Sprint water hybrid follow-up 2026-03-25: next implementation target is to evolve the Babylon hybrid water bridge from static section stamping into a persistent per-frame field that uses cached section gpuData and particle seeds to animate foam/flow masks without GPU readback, while keeping the current shader sampler contract stable."}, {"id": "c3fbf339-ce2a-43dc-aa02-aee47dbc1c8c", "mtype": "fact", "importance": 7, "color": "#00b4d8", "excerpt": "WaterSurfaceMesher active structure: meshWaterSurfaceSubset still emits water pe…", "tags": ["DVE", "DivineVoxelEngine", "WaterSurfaceMesher", "water", "architecture"], "created": "2026-03-25", "content": "WaterSurfaceMesher active structure: meshWaterSurfaceSubset still emits water per filled cell/column, but after 2026-03-25 refactor the per-cell preparation phase is isolated in prepareWaterCellRenderData(grid, regime, column, lx, lz, options). That helper computes heightNorm/fillFactor/shoreDistance/openEdgeFactor/flow/waterClassValue, adjusted corner tops, surface spline, vertex payload, corner "}, {"id": "6b3d42f9-6014-4154-8999-c88c07a5333e", "mtype": "fact", "importance": 7, "color": "#00b4d8", "excerpt": "DVE water normal fix: emitWaterQuad in WaterSurfaceMesher.ts was emitting FACETE…", "tags": ["DVE", "DivineVoxelEngine", "water", "normals", "faceted", "fix", "WaterSurfaceMesher", "DVEWaterMaterialPlugin"], "created": "2026-03-24", "content": "DVE water normal fix: emitWaterQuad in WaterSurfaceMesher.ts was emitting FACETED per-quad normals using computeTriangleNormal per face. Fixed by emitting flat (0,1,0) normals from CPU for ALL water surface vertices. GPU derives real normals from Gerstner-displaced geometry via dFdx/dFdy in fragment shader (dveGetDerivedWaterSurfaceNormal). Also removed the 8% fallbackNormal blend (mix(..., 0.92) "}, {"id": "475c353d-7f86-4ce7-9bb9-4e573ff07ce5", "mtype": "procedure", "importance": 7, "color": "#06d6a0", "excerpt": "Se creo un plan de ejecucion por sprints para el replan de agua AAA en DivineVox…", "tags": ["DVE", "DivineVoxelEngine", "water", "sprints", "plan", "AAA"], "created": "2026-03-24", "content": "Se creo un plan de ejecucion por sprints para el replan de agua AAA en DivineVoxelEngine en docs/water-aaa-sprint-plan-2026-03-24.md. Orden recomendado si el tiempo es limitado: baseline harness, contratos de render-state, split open-surface/shore-band, channel+wall-contact, wetness field, drop edges+foam classes, interaction atlas, anti-periodicity, moisture/sediment bridge. MVP recomendado: Spri"}, {"id": "09a2355b-8cf5-4fb7-9da8-da6f645f07d9", "mtype": "fact", "importance": 7, "color": "#00b4d8", "excerpt": "DVE hydrology diagnostics (2026-03-24): added lateralEqualizations and terraceHo…", "tags": ["DVE", "DivineVoxelEngine", "water", "hydrology", "debug", "HUD", "solver"], "created": "2026-03-24", "content": "DVE hydrology diagnostics (2026-03-24): added lateralEqualizations and terraceHoldCandidates metrics. lateralEqualizations increments when LiquidVoxelUpdate performs same-y redistribution; terraceHoldCandidates increments when a liquid voxel still has connected-body + lower-pocket context but ends the tick without any move, useful to detect terrace-style stalling on slopes."}, {"id": "3855f2dc-3f60-4775-80df-e53451dfb7a2", "mtype": "insight", "importance": 7, "color": "#ff9f1c", "excerpt": "DVE water type integration now blends river/lake/sea continuously in WaterSurfac…", "tags": ["DVE", "DivineVoxelEngine", "water", "rendering", "mesher", "shoreline"], "created": "2026-03-24", "content": "DVE water type integration now blends river/lake/sea continuously in WaterSurfaceMesher instead of sending a hard categorical class to the shader. The shader already supports continuous class weights via smoothstep on metadata.w, so the correct place to naturalize river-mouth/coastal transitions is the mesher/extractor signal, not extra shader branches."}, {"id": "f68349c7-ae94-40c4-bfba-a759510d9237", "mtype": "insight", "importance": 7, "color": "#ff9f1c", "excerpt": "DivineVoxelEngine hydrology realism pass: adapted shallow-water / virtual-pipes …", "tags": ["DVE", "DivineVoxelEngine", "water", "hydrology", "liquid", "solver", "realism"], "created": "2026-03-24", "content": "DivineVoxelEngine hydrology realism pass: adapted shallow-water / virtual-pipes ideas into LiquidVoxelUpdate by replacing single-best-neighbor lateral spread with head-driven multi-neighbor redistribution and discrete mass-conserving transfers. This is the practical near-term realism path for DVE without a full solver rewrite."}, {"id": "cc66ce2b-892f-4037-b809-ac1e220d9ec7", "mtype": "fact", "importance": 7, "color": "#00b4d8", "excerpt": "DVE Water session 2026-03-24: Bordes laterales del agua siguen cuadriculados pos…", "tags": ["DVE", "DivineVoxelEngine", "water", "foam", "shader", "bug", "grazing-angle"], "created": "2026-03-24", "content": "DVE Water session 2026-03-24: Bordes laterales del agua siguen cuadriculados post-foam-fix. dveIntersectionFoam funciona de frente pero falla en ángulos grazing porque dveWaterThickness aumenta y dveThicknessFactor se acerca a 1, anulando el smoothstep. Pendiente: foam basado en shore distance para cubrir este caso, o
