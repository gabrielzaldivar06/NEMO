<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #03050d;
    --surface:   rgba(8, 14, 30, 0.85);
    --border:    rgba(0, 180, 216, 0.18);
    --accent:    #00b4d8;
    --accent2:   #ff9f1c;
    --text:      #ccd6f6;
    --muted:     #6a80a7;
    --panel-w:   320px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  #graph-root { position: fixed; inset: 0; z-index: 1; }
  #graph-root canvas { display: block; }

  /* ── Top HUD ── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; gap: 18px;
    padding: 12px 22px;
    background: var(--surface);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    animation: slideDown 0.5s ease;
  }
  @keyframes slideDown { from { transform: translateY(-100%); opacity:0; } to { transform: none; opacity:1; } }
  #hud-title {
    font-size: 17px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-transform: uppercase;
  }
  #hud-stats { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }
  #hud-pulse {
    width: 8px; height: 8px; border-radius: 50%; background: #06d6a0; flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(6,214,160,0.7); }
    50%      { box-shadow: 0 0 0 7px rgba(6,214,160,0); }
  }
  #hud-spacer { flex: 1; }

  /* ── Side Panel ── */
  #panel {
    position: fixed; top: 56px; right: 0; bottom: 0; width: var(--panel-w);
    z-index: 10;
    background: var(--surface); backdrop-filter: blur(14px);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  #panel.collapsed { transform: translateX(var(--panel-w)); }
  #panel-toggle {
    position: absolute; left: -34px; top: 50%; transform: translateY(-50%);
    width: 34px; height: 56px;
    background: var(--surface); border: 1px solid var(--border); border-right: none;
    border-radius: 8px 0 0 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 14px; backdrop-filter: blur(14px);
  }
  #panel-inner { padding: 18px; overflow-y: auto; flex: 1; }
  .panel-section { margin-bottom: 20px; }
  .panel-section h3 {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* Legend */
  .leg-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 6px; font-size: 12px; cursor: pointer;
    border-radius: 4px; transition: background 0.15s;
  }
  .leg-row:hover { background: rgba(0,180,216,0.08); }
  .leg-row.inactive { opacity: 0.35; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 5px currentColor; }
  .leg-count { margin-left: auto; font-size: 10px; color: var(--muted); }

  /* Controls */
  .ctrl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 12px; }
  .ctrl-row label { color: var(--muted); min-width: 100px; }
  .ctrl-row input[type=range] {
    flex: 1; -webkit-appearance: none; height: 3px; border-radius: 2px; outline: none;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct, 0%), rgba(0,180,216,0.2) var(--pct,0%));
  }
  .ctrl-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 6px var(--accent); cursor: pointer;
  }
  .ctrl-val { min-width: 26px; text-align: right; color: var(--accent); font-weight: 600; }
  select {
    background: rgba(0,0,0,0.4); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; padding: 4px 8px; font-size: 12px; width: 100%;
  }
  select option { background: #0d1117; }

  /* Info card */
  #info-card {
    position: fixed; bottom: 24px; left: 24px;
    width: 360px; max-height: 260px; z-index: 20;
    background: var(--surface); backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; overflow-y: auto; display: none;
    animation: cardIn 0.25s ease;
  }
  @keyframes cardIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: none; } }
  #info-card .card-type { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
  #info-card .card-imp  { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  #info-card .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  #info-card .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: rgba(0,180,216,0.12); border: 1px solid rgba(0,180,216,0.25); color: var(--accent); }
  #info-card .card-content { font-size: 12px; line-height: 1.65; }
  #info-close { position: absolute; top: 10px; right: 12px; font-size: 16px; cursor: pointer; color: var(--muted); }
  #info-close:hover { color: var(--text); }
  .imp-stars { color: var(--accent2); letter-spacing: 1px; }

  /* Search */
  #search {
    background: rgba(0,0,0,0.35); color: var(--text);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 14px; font-size: 12px; width: 220px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,180,216,0.25); }
  #search::placeholder { color: var(--muted); }

  /* Hover tooltip */
  #tooltip {
    position: fixed; z-index: 30; pointer-events: none; display: none;
    background: rgba(3,5,13,0.92); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; font-size: 11px; line-height: 1.55;
    max-width: 260px; color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
</style>
</head>

      <div class="ctrl-row" style="margin-top:4px;"><label>Type</label></div>

    </div>
    <div class="panel-section">
      <h3>Simulation</h3>

        <input type="range" id="repSlider" min="0.2" max="4" step="0.1" value="1.5">

      </div>
      <div class="ctrl-row">
        <label>Link spring</label>
        <input type="range" id="springSlider" min="0.05" max="2" step="0.05" value="0.3">

    </div>
  </div>
</div>

<div id="tooltip"></div>

  <div class="card-imp"  id="card-imp"></div>
  <div class="card-tags" id="card-tags"></div>
  <div class="card-content" id="card-content"></div>
</div>

store_ai_reflection, write_ai_insights, get_system_health, reflect_on_tool_usage, get_current_time, store_project_insight, link_code_context, get_project_continuity, get_character_context y store_roleplay_memory son herramientas opcionales que solo se usan si el usuario las pide explícitamente.\nREALIDAD: Estas 11 herramientas tienen triggers OBL"}, {"id": "3502af8c-42c6-4642-b0fd-40555ccc2900", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Es aceptable responder sin llamar prime_context …", "tags": ["correction", "feedback", "nemo", "prime_context", "hook", "mandatory"], "created": "2026-03-27", "content": "CORRECCIÓN — lo que estaba mal: Es aceptable responder sin llamar prime_context cuando hay conversation summary disponible o la pregunta parece simple.\nREALIDAD: Llamar mcp_nemo_prime_context(topic='memory persistence') SIEMPRE como primera herramienta de cada sesión, antes de cualquier búsqueda de código, lectura de archivo o respuesta al usuario."}, {"id": "d050945e-24db-4ed0-bd71-cbdc9dd0631d", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Suavizar el hybrid bridge y reducir el peso visu…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "foam", "sbsar"], "created": "2026-03-26", "content": "CORRECCIÓN — lo que estaba mal: Suavizar el hybrid bridge y reducir el peso visual del mapa de gotas bastaría para mejorar la superficie sin introducir nuevos artefactos visibles.\nREALIDAD: En esta escena aparecieron franjas blancas de baja calidad; el usuario quiere eliminar todo rastro de esas máscaras y reemplazarlas por un bake real derivado del .sbsar, no seguir iterando sobre la misma famili"}, {"id": "9526f089-9af6-498f-b772-435f76a85cd7", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Preparar el sampler dual de espuma con fallback …", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "foam"], "created": "2026-03-26", "content": "CORRECCIÓN — lo que estaba mal: Preparar el sampler dual de espuma con fallback al mapa actual produciría una mejora visual inmediata en la superficie.\nREALIDAD: Sin exportar y conectar un mapa nuevo, el fallback mantiene prácticamente el mismo aspecto de espuma. La mejora visual real requiere cambiar el asset efectivo o la composición del shader para no depender del mismo mapa base.\nContexto: Div"}, {"id": "35b5ab35-6b43-46da-9d20-c3e2b93040c0", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: La caída observada se explicaba principalmente p…", "tags": ["correction", "feedback", "DVE", "performance", "PBR", "benchmark"], "created": "2026-03-26", "content": "CORRECCIÓN — lo que estaba mal: La caída observada se explicaba principalmente por un dev server viejo o por cargar escenas/presets incorrectos; además interpreté la subida al cambiar de ventana como señal de una instancia desactualizada.\nREALIDAD: El caso correcto a validar es la ruta PBR completa en presets como Definitivo/PBR Premium. El FPS puede variar por prioridad de ventana, pero el proble"}, {"id": "a47c32da-537d-4525-a173-ec2cee264ef4", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Los presets PBR Premium V2 y Optimum Inspired es…", "tags": ["correction", "feedback", "DivineVoxelEngine", "water", "performance", "pbr", "benchmark"], "created": "2026-03-26", "content": "CORRECCIÓN — lo que estaba mal: Los presets PBR Premium V2 y Optimum Inspired estaban atrapados en errores de carga de texturas o no eran válidos para medir rendimiento.\nREALIDAD: Esos presets sólo estaban terminando de cargar; una vez estabilizan quedan alrededor de 35-60 fps y sí son los correctos para validar.\nContexto: DivineVoxelEngine water performance validation on PBR Premium V2, Optimum I"}, {"id": "507a9ff3-f4bb-4ca4-8761-e6beeeeb14cd", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Validar la regresión en Sunlit Beach/classic era…", "tags": ["correction", "feedback", "DVE", "water", "performance", "benchmark", "pbr"], "created": "2026-03-26", "content": "CORRECCIÓN — lo que estaba mal: Validar la regresión en Sunlit Beach/classic era suficiente para diagnosticar el problema actual de rendimiento del agua.\nREALIDAD: Las validaciones relevantes deben hacerse en los presets PBR Premium V2, Optimum Inspired o Definitivo, porque ahí están las flags completas y la ruta moderna que importa para este bug.\nContexto: DivineVoxelEngine water performance vali"}, {"id": "e30396da-c490-4456-bbfa-dbf532d24289", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Reducing water-related shadow draw calls by excl…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "performance", "shadows"], "created": "2026-03-26", "content": "CORRECCIÓN — lo que estaba mal: Reducing water-related shadow draw calls by excluding liquid meshes from shadow casting/receiving would be an acceptable optimization tradeoff for the current DVE benchmark.\nREALIDAD: For this DVE water benchmark, preserving shadow detail is more important than saving draw calls if FPS does not improve materially. Do not keep visual regressions like lost water/terra"}, {"id": "8415cb9e-425f-41c9-a3d6-fbf9a97ce33d", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "DVE WaterSurfaceMesher CPU XZ warp seam ROOT CAUSE (2026-03-26):\nemitAdaptiveWat…", "tags": ["DVE", "DivineVoxelEngine", "water", "mesh", "seam", "geometry"], "created": "2026-03-26", "content": "DVE WaterSurfaceMesher CPU XZ warp seam ROOT CAUSE (2026-03-26):\nemitAdaptiveWaterSurface (WaterSurfaceMesher.ts ~L1828) and sampleInterpolatedPoint (~L824) applied XZ vertex warp/jitter using LOCAL section indices (topNE[0] = lx+1, range 0-8) in sin/cos/hash2D expressions.\nRoot cause: at an 8×8 section boundary the same world vertex has local X=8 from section A and local X=0 from section B → sin("}, {"id": "76364158-18d8-47f5-85e7-8ad612637f66", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "DVE Water — ROOT CAUSE FIX for 8x8 cell-boundary grid in open sea (2026-03-26)\n\n…", "tags": ["DVE", "DivineVoxelEngine", "water", "shader", "seam", "cell-boundary", "flowDir", "ROOT_CAUSE"], "created": "2026-03-26", "content": "DVE Water — ROOT CAUSE FIX for 8x8 cell-boundary grid in open sea (2026-03-26)\n\n## Causa raíz\ndveWaterFlowNoise, dveWaterWave, y dveWaterContinuousHeight usaban dveFlowDirection (per-célula, varying vec4 dveWaterFlowData) para advectar el dominio o computar la fase de ola. En el límite entre dos celdas adyacentes, los vértices en la MISMA posición world pertenecen a dos celdas distintas con difere"}, {"id": "412d444f-be62-42a0-baec-f10a581e73cd", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Bastaba con degradar continuous-patch a patch-pr…", "tags": ["correction", "feedback", "DVE", "water", "continuous-patch", "regression"], "created": "2026-03-26", "content": "CORRECCIÓN — lo que estaba mal: Bastaba con degradar continuous-patch a patch-preview cuando no emitia nada para resolver la desaparicion del agua.\nREALIDAD: Ese cambio introdujo una regresion parcial a legacy/patch-preview innecesaria y no soluciono el problema. Hay que eliminarlo y corregir la integracion de continuous-patch en su propia ruta moderna.\nContexto: DivineVoxelEngine water composer r"}, {"id": "b7882c1b-c995-4dce-af7e-135186324944", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: La mejor mitigación inmediata era volver el modo…", "tags": ["correction", "feedback", "DVE", "water", "continuous-patch", "integration"], "created": "2026-03-26", "content": "CORRECCIÓN — lo que estaba mal: La mejor mitigación inmediata era volver el modo por defecto del agua grande a legacy para evitar desaparición total.\nREALIDAD: El usuario no quiere volver a legacy; hay que completar la integración de la ruta moderna continuous-patch/patch system y corregir la brecha de emisión sin revertir el modo global.\nContexto: DivineVoxelEngine water surface mesher integratio"}, {"id": "f2c2f078-3f14-4934-b297-64e195a8a11f", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Asumí que el problema principal del agua moderna…", "tags": ["correction", "feedback", "DVE", "water", "PBR", "wetness", "transparency"], "created": "2026-03-26", "content": "CORRECCIÓN — lo que estaba mal: Asumí que el problema principal del agua moderna era el tinte por baseWeight y apliqué un cambio que resolvía visibilidad sin verificar que preservara el wetness ni que la transparencia fuera el problema real.\nREALIDAD: El problema actual es que el agua está quedando transparente y los últimos cambios quitaron el wetness. La corrección debe preservar o restaurar el "}, {"id": "48033ce7-3701-4892-88eb-7ac77136cc13", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: La invisibilidad del agua activa estaba en el re…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "Optimum Inspired", "Universalis", "hybrid"], "created": "2026-03-25", "content": "CORRECCIÓN — lo que estaba mal: La invisibilidad del agua activa estaba en el renderer classic/legacy y debía arreglarse en el shader clásico dve_liquid.\nREALIDAD: El agua que no aparece es la de los presets Optimum Inspired o Universalis, es decir el path moderno/híbrido en el que hemos estado trabajando, no el agua legacy/classic.\nContexto: DivineVoxelEngine water debugging session"}, {"id": "4c0769f2-6e0a-4c96-8925-97d3c7de5fbb", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Asumí que la escena hydrology-mls-mpm-showcase s…", "tags": ["correction", "feedback", "DVE", "water", "legacy", "scene-validation"], "created": "2026-03-25", "content": "CORRECCIÓN — lo que estaba mal: Asumí que la escena hydrology-mls-mpm-showcase servía para validar el bug visual actual del agua.\nREALIDAD: Ese preset no sirve porque tiene lógica legacy de agua; la validación debe hacerse en una escena que use la ruta nueva del agua.\nContexto: DivineVoxelEngine water rendering validation"}, {"id": "eda295db-01ed-40e5-b153-4de885d5ec65", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Que la primera instrumentación visual ya permití…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "debug", "instrumentation"], "created": "2026-03-25", "content": "CORRECCIÓN — lo que estaba mal: Que la primera instrumentación visual ya permitía distinguir limpiamente ownership, bridge raw, composition y context sin contaminar todos los modos con la misma lectura de rejilla.\nREALIDAD: El usuario observó que todos los modos muestran la misma rejilla 8x8 con juntas, lo que indica que la instrumentación actual está imponiendo un patrón común y no está separando"}, {"id": "93cb265f-b392-4c47-80a8-18cb64334685", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Sprint 4 local fluid in DivineVoxelEngine still …", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "MLS-MPM", "GPU", "Sprint4"], "created": "2026-03-25", "content": "CORRECCIÓN — lo que estaba mal: Sprint 4 local fluid in DivineVoxelEngine still treated MLS-MPM as only an escalation path and the runtime effectively remained PBF-first by default.\nREALIDAD: The local fluid runtime now prefers the real GPU MLS-MPM solver when WebGPU is available, reseeds from transported particles and interaction hotspots, and falls back to PBF only when GPU startup fails or WebG"}, {"id": "37dd0925-5c36-4462-9d29-f4b6bfb52825", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Asumí que el siguiente bloqueo dominante para lo…", "tags": ["correction", "feedback", "DVE", "water", "architecture", "AAA", "legacy", "WebGPU-Ocean"], "created": "2026-03-25", "content": "CORRECCIÓN — lo que estaba mal: Asumí que el siguiente bloqueo dominante para lograr costa AAA era principalmente la capa de shading/material visible.\nREALIDAD: El problema principal sigue siendo arquitectónico: la base visible de agua continúa leyéndose como legacy/cuadriculada y no ha sido reemplazada de verdad por un patch mesh continuo con shader avanzado para masas grandes, fluidos locales GP"}, {"id": "65d6983c-17e7-4493-a802-6c3eaebaa3d8", "mtype": "fact", "importance": 10, "color": "#00b4d8", "excerpt": "2026-03-25 active water AAA direction update: the older conservative hybrid repl…", "tags": ["DVE", "DivineVoxelEngine", "water", "AAA", "hybrid-plan", "PBF", "SSFR"], "created": "2026-03-25", "content": "2026-03-25 active water AAA direction update: the older conservative hybrid replan is now superseded as the active roadmap. The official visible-water target is continuous patch mesh for large masses, advanced unified shadering, local GPU fluid simulation, and PBF-first plus SSFR as the new visible surface base. Any roadmap that preserves the old grid/column/seam-repair visible structure as an acc"}, {"id": "befb83bb-ca53-4af8-bf0d-9949910d62ae", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Asumí que el plan de referencia vigente seguía s…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "AAA", "hybrid-plan"], "created": "2026-03-25", "content": "CORRECCIÓN — lo que estaba mal: Asumí que el plan de referencia vigente seguía siendo el replan híbrido conservador de 2026-03-24 y que la base visible actual debía evolucionar gradualmente desde la estructura columnar/mesher existente.\nREALIDAD: Ese plan ya está viejo. El objetivo vigente debe actualizarse explícitamente hacia AAA: desechar referencias que devuelvan a la estructura cuadriculada d"}, {"id": "64885e78-30a0-488c-868e-465d95735ae3", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Que los cambios recientes de water meshing/paddi…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "runtime", "build"], "created": "2026-03-25", "content": "CORRECCIÓN — lo que estaba mal: Que los cambios recientes de water meshing/padding ya estaban visibles o al menos cargados en la demo tras recompilar.\nREALIDAD: El usuario sigue viendo exactamente el mismo resultado visual; hay que tratarlo como evidencia de que la ruta runtime activa no está usando esos cambios o que el problema está en una capa más profunda no tocada todavía.\nContexto: DivineVox"}, {"id": "4aae1433-bfd3-4d52-99ea-fd2be37d7d22", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: En Babylon.js PBR MaterialPluginBase, el bloque …", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "shader", "babylon", "positionUpdated"], "created": "2026-03-25", "content": "CORRECCIÓN — lo que estaba mal: En Babylon.js PBR MaterialPluginBase, el bloque CUSTOM_VERTEX_UPDATE_POSITION no dispone de la variable `positionUpdated`, por lo que el código de DVEWaterMaterialPlugin que escribe en `positionUpdated.x/y/z` impediría las olas.\nREALIDAD: En el shader base de Babylon.js, `positionUpdated` sí se declara antes de `CUSTOM_VERTEX_UPDATE_POSITION` (`vec3 positionUpdated "}, {"id": "7166f82f-b139-45d5-b4c4-1db61b23d358", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Que `view.position` es un uniform válido en el v…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "shader", "Babylon", "GLSL", "vertex-shader"], "created": "2026-03-24", "content": "CORRECCIÓN — lo que estaba mal: Que `view.position` es un uniform válido en el vertex shader de Babylon.js PBR. Lo usé para camera-distance LOD: `float dveCameraDist = length(view.position.xyz - positionUpdated.xyz)`. Esto compiló silenciosamente mal y el agua se volvió invisible.\nREALIDAD: En Babylon.js PBR MaterialPluginBase, `view.position` NO existe en el vertex shader. Solo `vEyePosition` exi"}, {"id": "efcfbd16-5385-4ce2-8299-9b17fe321734", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Que el jitter, domain warp, o frecuencias irraci…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "architecture", "grid", "topology", "GPU"], "created": "2026-03-24", "content": "CORRECCIÓN — lo que estaba mal: Que el jitter, domain warp, o frecuencias irracionales en GPU podían eliminar el grid pattern. El grid era por topología discontinua entre celdas con diferentes subdivision counts (4 vs 6 vs 8), no por posicioning o frecuencias.\nREALIDAD: La causa raíz del grid es TOPOLÓGICA: getAdaptiveSubdivisionCount daba 4-8 subdivisions por celda según pendiente/shore/interacti"}, {"id": "61e0d7c7-cc00-4155-85ba-4e7c8d915694", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Que el CPU vertex jitter (0.18/subdivisions ≈ 0.…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "grid", "topology", "GPU", "mesher"], "created": "2026-03-24", "content": "CORRECCIÓN — lo que estaba mal: Que el CPU vertex jitter (0.18/subdivisions ≈ 0.023 units) y el GPU domain warp con frecuencias irracionales serían suficientes para eliminar el patrón cuadriculado del agua. El jitter era 9% del tamaño de quad y el domain warp solo afectaba fases de ola, no la posición real XZ de los vértices.\nREALIDAD: El grid del agua es TOPOLÓGICO, no de frecuencias. Los quads d"}, {"id": "b5ca7990-56e0-406f-9f12-0236d6c3860d", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Que mover la deformación principal del agua a GP…", "tags": ["correction", "feedback", "DVE", "water", "mesher", "GPU"], "created": "2026-03-24", "content": "CORRECCIÓN — lo que estaba mal: Que mover la deformación principal del agua a GPU y fijar la subdivisión CPU en 2 sería suficiente para eliminar visualmente el patrón cuadriculado.\nREALIDAD: El patrón cuadriculado siguió visible. Hay que reactivar subdivisión adaptativa en CPU, usar Catmull-Rom en sampleInterpolatedSurfaceY y volver a activar sampleWarpedInterpolatedPoint para romper regularidad e"}, {"id": "0e610f16-00c3-479f-9b0b-58ce8615da3d", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Asumí que podía eliminar el warp XZ del top surf…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "mesher", "warp-xz"], "created": "2026-03-24", "content": "CORRECCIÓN — lo que estaba mal: Asumí que podía eliminar el warp XZ del top surface y seguir atacando el artefacto visual solo con cambios en interpolación de altura.\nREALIDAD: El warp XZ muerto en sampleWarpedInterpolatedPoint era una parte real del problema visual: sin romper la alineación en XZ, la superficie sigue leyéndose como placas/tejas aunque cambie la altura Y. La corrección debe inclui"}, {"id": "b9e27f62-bba3-486a-987f-a777af329f29", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Asumí que eliminar el cellWindow y pasar a corne…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "mesher", "visual-validation"], "created": "2026-03-24", "content": "CORRECCIÓN — lo que estaba mal: Asumí que eliminar el cellWindow y pasar a corner-averaged mesher state en WaterSurfaceMesher.ts era una corrección suficiente y visualmente válida para el efecto pillow/grid del agua.\nREALIDAD: La corrección entregada no resolvió el problema visual y produjo un resultado inaceptable en render. En este problema no basta con compilar y rebuild; la validación visual r"}, {"id": "79899d83-84ac-4290-80de-d7a939f603f5", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Que el avance reciente de Sprint 4 implicaba una…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "sprint4", "visual-regression"], "created": "2026-03-24", "content": "CORRECCIÓN — lo que estaba mal: Que el avance reciente de Sprint 4 implicaba una mejora visual suficiente del agua en integración fluida, sin regresión importante de cuadriculado grueso.\nREALIDAD: El usuario reporta que el agua tiene mejor comportamiento, pero ahora la cuadrícula es más grosera y no se integra como fluido. Hay que tratarlo como regresión visual real y reevaluar si el problema es d"}, {"id": "aef5d785-95a7-4828-b658-55a522485762", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Ya habia persistido en NEMO la lectura concreta …", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "hydrology", "NEMO"], "created": "2026-03-24", "content": "CORRECCIÓN — lo que estaba mal: Ya habia persistido en NEMO la lectura concreta del HUD y su interpretacion mas reciente sobre el estado del agua.\nREALIDAD: No se habia guardado en NEMO la lectura concreta del HUD reportada por el usuario. Debe persistirse explicitamente: diagonalSpills 0-1-2-0, lateralEqualizations 30-80-30, terraceHoldCandidates 0-2-4-0.\nContexto: DivineVoxelEngine hydrology dia"}, {"id": "7233ac58-6ebe-4783-9591-adddc9baf241", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: La segunda correccion visual de open-edge relaxa…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "hydrology", "rendering"], "created": "2026-03-24", "content": "CORRECCIÓN — lo que estaba mal: La segunda correccion visual de open-edge relaxation + seam-base lifting seria suficiente para cambiar perceptiblemente el aspecto del agua estratificada.\nREALIDAD: El cambio fue marginal; los diagonal spills llegan solo hasta 6 y vuelven a 0, y el aspecto sigue casi identico. La causa dominante sigue sin resolverse y probablemente esta en una limitacion mas profund"}, {"id": "6ccfa041-1e8d-454a-8e7b-1088c5932b77", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: La corrección basada en renderSurfaceY producirí…", "tags": ["correction", "feedback", "DVE", "DivineVoxelEngine", "water", "hydrology", "rendering"], "created": "2026-03-24", "content": "CORRECCIÓN — lo que estaba mal: La corrección basada en renderSurfaceY produciría una mejora visual perceptible inmediata en la estratificación restante.\nREALIDAD: El usuario reportó que no hubo diferencia visible; la causa residual sigue en otra parte de la representación final del agua o en una ruta geométrica no afectada por renderSurfaceY.\nContexto: DivineVoxelEngine hydrology rendering follow"}, {"id": "82a8784a-0716-433d-8b73-ce11ef6c734b", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Asumi que el modelo activo seguia siendo Gemma y…", "tags": ["correction", "feedback", "lm_studio", "brain", "model_config", "minicpm", "stale_config"], "created": "2026-03-24", "content": "CORRECCIÓN — lo que estaba mal: Asumi que el modelo activo seguia siendo Gemma y que esa configuracion representaba el brain actual.\nREALIDAD: El modelo Gemma ya fue descartado; ahora el modelo que se usa es MiniCPM. Si aparece Gemma en errores o config, es una referencia stale o residual.\nContexto: Configuracion del brain / LM Studio en NEMO ASSIST"}, {"id": "b2ca8d40-c2b6-4ee0-a004-1df381b942c0", "mtype": "correction", "importance": 10, "color": " ", "mtype": "technical", "importance": 10, "color": "#607d8b", "excerpt": "DVE PACKAGE INVENTORY — ACTIVE vs DEAD (22 marzo 2026)\n\n═══ ACTIVE PACKAGES (KEE…", "tags": ["DVE", "package-inventory", "active-packages", "dead-code", "cleanup-targets", "master-reference"], "created": "2026-03-22", "content": "DVE PACKAGE INVENTORY — ACTIVE vs DEAD (22 marzo 2026)\n\n═══ ACTIVE PACKAGES (KEEP) ═══\n\npackages/vlox (v0.0.80) — Core voxel engine, ~500 TS files. THE main codebase.\npackages/vlox-babylon (v0.0.59) — BabylonJS renderer, ~300 TS files. Default renderer.\nlibs/amodx/threads — Multi-threaded task/worker system. Used by vlox, demos, games.\nlibs/amodx/math — Vectors, matrices, geometry, bounds. Used ev"}, {"id": "737e544e-7e4b-48ea-94ff-df933e297f62", "mtype": "technical", "importance": 10, "color": "#607d8b", "excerpt": "DVE REPOSITORY ARCHITECTURE — MASTER REFERENCE (22 marzo 2026)\n\nWORKSPACE SETUP:…", "tags": ["DVE", "repository-architecture", "monorepo", "workspace", "build-system", "dependency-graph", "master-reference"], "created": "2026-03-22", "content": "DVE REPOSITORY ARCHITECTURE — MASTER REFERENCE (22 marzo 2026)\n\nWORKSPACE SETUP:\n- Root: c:\\dev\\dev5\\DivineVoxelEngine\n- Manager: npm workspaces (native npm v7+), NO Turborepo/Nx/pnpm\n- 19 workspace entries total (all output to /dist folders before linking)\n- Root scripts: init:all (initializes all @amodx + @divinevoxel packages)\n- Build: node ./scripts/build-workspace-package.mjs [package-names]\n"}, {"id": "8441fc37-8dd2-4650-a3bb-8a0ef5cab974", "mtype": "technical", "importance": 10, "color": "#607d8b", "excerpt": "ESTADO ACTUAL DEL BUG DE AGUA ESTÁTICA — 22 marzo 2026\n\nRESUMEN: Después de 4 in…", "tags": ["DVE", "water-flow-bug", "estado-actual", "session-snapshot", "LiquidVoxelUpdate", "cursor-aliasing"], "created": "2026-03-22", "content": "ESTADO ACTUAL DEL BUG DE AGUA ESTÁTICA — 22 marzo 2026\n\nRESUMEN: Después de 4 intentos de fix, el agua SIGUE SIN FLUIR cuando el usuario la coloca en el editor.\n\nFIXES APLICADOS (todos en LiquidVoxelUpdate.ts):\n1. Finite volume fix: auto-fill condicional con chequeo de upVoxel (sesión anterior)\n2. isSame early-return: movido `return` dentro de `if(addToTick)` para que isSame-below caiga al spread "}, {"id": "1fbc7dbb-f897-49d4-aec9-bc865aa6ae70", "mtype": "technical", "importance": 10, "color": "#607d8b", "excerpt": "CRITICAL BUG FIX: Cursor aliasing in LiquidVoxelUpdate.ts downward flow drain.\n\n…", "tags": ["DVE", "cursor-aliasing", "water-flow", "LiquidVoxelUpdate", "critical-bug", "DimensionSimulation"], "created": "2026-03-22", "content": "CRITICAL BUG FIX: Cursor aliasing in LiquidVoxelUpdate.ts downward flow drain.\n\nROOT CAUSE: DimensionSimulation.cursor is a shared WorldVoxelCursor. When getVoxelForUpdate(x,y,z) is called, it returns cursor.getVoxel(x,y,z) which moves the SAME cursor object and returns it. In LiquidVoxelUpdate.run(), `voxel` is obtained from simulation.cursor. Then simulation.brush.paint() → SimulationBrush.paint"}, {"id": "34bea181-4b54-49e5-a71e-a26f9fc731a0", "mtype": "technical_fix", "importance": 10, "color": "#607d8b", "excerpt": "DVE Water Static Bug Fix (2026-03-22 session 2):\n\nPROBLEMA: Tras el fix de volum…", "tags": ["DVE", "water", "flow", "static-bug", "LiquidVoxelUpdate", "horizontal-spread", "isSame", "early-return"], "created": "2026-03-22", "content": "DVE Water Static Bug Fix (2026-03-22 session 2):\n\nPROBLEMA: Tras el fix de volumen finito, el agua quedó completamente estática — no fluía horizontalmente.\n\nCAUSA RAÍZ: En LiquidVoxelUpdate.ts (line ~167-203), el bloque de flujo descendente tiene un `return` que se ejecutaba SIEMPRE, incluso cuando `addToTick` era false. Cuando downVoxel es el mismo líquido (isSame=true) pero no se creó agua nueva"}, {"id": "8331fc6d-fa89-4b27-973e-71eecd00f5c7", "mtype": "technical_fix", "importance": 10, "color": "#607d8b", "excerpt": "DVE Water Finite Volume Fix (2026-03-22):\n\nPROBLEM: Water generates infinitely w…", "tags": ["DVE", "water", "finite-volume", "flow", "LiquidVoxelUpdate", "levelState", "auto-fill", "infinite-water-fix", "hydrology"], "created": "2026-03-22", "content": "DVE Water Finite Volume Fix (2026-03-22):\n\nPROBLEM: Water generates infinitely when placed. 3 root causes:\n1. Auto-fill bug (LiquidVoxelUpdate.ts L84-89): ANY voxel with levelState=1 auto-fills to level=7 WITHOUT checking if there's a liquid source above. Horizontal spread creates voxels with state=1 → they auto-fill to 7 → spread more → infinite loop.\n2. Horizontal spread uses levelState=1 (L202)"}, {"id": "c4657f42-2581-4803-9b8f-15052d467d0d", "mtype": "tombstone", "importance": 10, "color": "#607d8b", "excerpt": "La República de Moravia del Norte NO EXISTE como país reconocido internacionalme…", "tags": ["moravia-del-norte", "pais", "republica"], "created": "2026-03-22", "content": "La República de Moravia del Norte NO EXISTE como país reconocido internacionalmente."}, {"id": "b954e4ab-015d-4e5e-bef6-588e8fdc9d65", "mtype": "tombstone", "importance": 10, "color": "#607d8b", "excerpt": "La Dra. Elena Vasquez del MIT NO EXISTE como investigadora verificada en registr…", "tags": ["elena-vasquez", "mit", "investigadora"], "created": "2026-03-22", "content": "La Dra. Elena Vasquez del MIT NO EXISTE como investigadora verificada en registros académicos públicos."}, {"id": "e7733770-5c2a-4024-8d2a-db767c537782", "mtype": "tombstone", "importance": 10, "color": "#607d8b", "excerpt": "El artículo 412-B de la Constitución de México NO EXISTE — ese número de artícul…", "tags": ["articulo-412-b", "constitucion", "mexico"], "created": "2026-03-22", "content": "El artículo 412-B de la Constitución de México NO EXISTE — ese número de artículo no aparece en la Constitución Política de los Estados Unidos Mexicanos."}, {"id": "5da4e5a0-3e73-416b-b4c3-4d6fd67d2919", "mtype": "tombstone", "importance": 10, "color": "#607d8b", "excerpt": "Zeltraxin 200mg NO EXISTE — no es un medicamento real ni aprobado en nin mtype": "knowledge", "importance": 10, "color": "#607d8b", "excerpt": "## Fracture UI Components — Mapa Operativo\n\n### FractureOverlayPanel.tsx (src/co…", "tags": ["fracture-ui", "overlay-panel", "evidence-overlay", "svg", "slider", "sensitivity", "premium-bbox", "cam-layer"], "created": "2026-03-21", "content": "## Fracture UI Components — Mapa Operativo\n\n### FractureOverlayPanel.tsx (src/components/fracture/)\n- Panel flotante con controles para análisis de fracturas\n- Botones: Analizar/Reanalizar, Ocultar/Mostrar overlay\n- **Slider de sensibilidad** (~L280-295):\n  - `<input type=\"range\" min=0 max=100>` dentro de div con `data-ui-control=\"sensitivity-slider\"`\n  - Events: onPointerDown, onMouseDown, onTouc"}, {"id": "697c679e-d906-4246-87cd-af687b54dc8c", "mtype": "knowledge", "importance": 10, "color": "#607d8b", "excerpt": "## Fracture AI Pipeline Completo — Mapa Operativo\n\n### Archivo Backend: scripts/…", "tags": ["fracture-ai", "pipeline", "densenet", "yolov8", "fusion", "gradcam", "inference", "api-response"], "created": "2026-03-21", "content": "## Fracture AI Pipeline Completo — Mapa Operativo\n\n### Archivo Backend: scripts/fracture_overlay_infer.py (~960 líneas)\n\n### Configuración (L50-60)\n- CONFIDENCE_THRESHOLD = 0.10 (era 0.25 → reducido en hotfix)\n- YOLO_CONF_THRESHOLD = 0.15\n- YOLO_IOU_THRESHOLD = 0.45\n- WEIGHT_DENSENET = 0.4\n- WEIGHT_YOLO = 0.6\n- DENSENET_INPUT_SIZE = 512 (cuadrado, distorsiona aspect ratio)\n- GRADCAM_THRESHOLD_PERC"}, {"id": "87f86202-5629-4fd9-95d0-0efb61f9ca19", "mtype": "knowledge", "importance": 10, "color": "#607d8b", "excerpt": "## DicomViewerFixed.tsx — Mapa Operativo Completo\n\n### Ubicación: src/components…", "tags": ["dicom-viewer", "cornerstone", "event-listeners", "viewport", "overlays", "mapa-operativo"], "created": "2026-03-21", "content": "## DicomViewerFixed.tsx — Mapa Operativo Completo\n\n### Ubicación: src/components/DicomViewerFixed.tsx (~5400 líneas)\nEste es el componente más grande y crítico. Maneja DICOM viewing, todos los overlays de IA, herramientas de imagen, y comparación.\n\n### Estado Clave (useState)\n- L1146: `viewerElement` — HTMLElement del viewport Cornerstone\n- L1276: `fractureOverlayResult` — Resultado de IA fractura"}, {"id": "506911f8-9ec5-4558-baaf-e123baf73a3c", "mtype": "knowledge", "importance": 10, "color": "#607d8b", "excerpt": "## RAD IA PLATFORM — Arquitectura General y Stack Técnico\n\n### Stack\n- **Framewo…", "tags": ["rad-ia", "arquitectura", "stack", "estructura", "archivos-clave"], "created": "2026-03-21", "content": "## RAD IA PLATFORM — Arquitectura General y Stack Técnico\n\n### Stack\n- **Framework**: Next.js 15.1 (App Router), React 18.3, TypeScript 5.7\n- **CSS**: Tailwind 3.4, PostCSS\n- **DB**: Prisma 6.1 con SQLite (schema en prisma/schema.prisma)\n- **Auth**: NextAuth (src/app/api/auth/)\n- **Idioma UI**: Español\n\n### Estructura de Carpetas Clave\n- `src/app/` — App Router pages (dashboard, viewer, auth, api,"}, {"id": "e945a6e6-74e8-4648-adaf-4cae83746e5b", "mtype": "skill", "importance": 10, "color": "#607d8b", "excerpt": "DVE Editor Bug-Fixing History — Complete tracker across all audit phases:\n\nPHASE…", "tags": ["DVE", "editor", "bug-tracker", "all-phases", "SimulationBrush", "PaintVoxelData", "PickVoxel", "VoxelPlacingStrategy", "BrushTool", "history"], "created": "2026-03-21", "content": "DVE Editor Bug-Fixing History — Complete tracker across all audit phases:\n\nPHASE 1 (template routing/behavior dispatch):\n- SimulationBrush.paintTemplate/eraseSelection resolved behavior using stale this.data.id instead of actual voxel in cell\n- replaceTemplate is correct path for overwriting existing voxels (preserves secondary/material, runs erase→paint cycle)\n- paintTemplate only safe for free p"}, {"id": "382acc2e-eb68-4d14-9596-76ca43d862c9", "mtype": "technical", "importance": 10, "color": "#607d8b", "excerpt": "## RAD-IA PLATFORM — Estado del Proyecto (Marzo 2026)\n\n### Sesión Actual: Fixes …", "tags": ["rad-ia", "estado-proyecto", "bugs-corregidos", "totalsegmentator", "mpr", "upload", "specialist-consensus", "marzo-2026"], "created": "2026-03-21", "content": "## RAD-IA PLATFORM — Estado del Proyecto (Marzo 2026)\n\n### Sesión Actual: Fixes Completados\n\n**1. TotalSegmentator + MPR Viewer (7 bugs corregidos)**\nArchivos: `src/app/api/ai/anatomy-map/route.ts` (~3700 LOC), `src/components/mpr/MPRLab.tsx` (~4000 LOC)\n\nAPI fixes:\n- Instance ordering: archivos DICOM ahora se ordenan por instanceNumber antes de copiar a TotalSeg\n- Spawn timeout: 5 min (SPAWN_TIME"}, {"id": "efed48c9-bd59-46a2-8221-58a9be0fabf2", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: Que podía seguir iterando cambios de agua/hidrol…", "tags": ["correction", "feedback", "water", "hydrology", "regression", "user-preference", "mcp-nemo"], "created": "2026-03-20", "content": "CORRECCIÓN — lo que estaba mal: Que podía seguir iterando cambios de agua/hidrología agresivamente sin suficiente validación conservadora ni control de regresiones visuales/funcionales.\nREALIDAD: En este repo los cambios de agua/hidrología requieren extrema cautela, validación visual y funcional conservadora, y evitar tocar más de lo necesario. Debo usar memoria persistente vía MCP Nemo constantem"}, {"id": "7c0f0dc2-ca9d-4614-a4a8-accbb44915c1", "mtype": "skill", "importance": 10, "color": "#607d8b", "excerpt": "Fix reciente relevante en DivineVoxelEngine: el bug sistémico de agua rojo-negro…", "tags": ["DivineVoxelEngine", "water", "rendering", "hydrology", "bugfix", "mesher", "geometrylut", "voxellut", "validation"], "created": "2026-03-20", "content": "Fix reciente relevante en DivineVoxelEngine: el bug sistémico de agua rojo-negro se resolvió en WaterSurfaceMesher.resolveWaterTexture corrigiendo el lookup de geometry inputs con doble indirection (VoxelLUT.geometryInputsIndex -> GeometryLUT.geometryInputsIndex -> GeometryLUT.geometryInputs) y soportando inputs en formato array quad [enabled, texture, rotation, doubleSided, uvs], donde la textura"}, {"id": "7e44205e-63de-4eda-8e81-691cee238312", "mtype": "preference", "importance": 10, "color": "#a855f7", "excerpt": "Directriz permanente del usuario para este entorno: usar NEMO como memoria persi…", "tags": ["nemo", "workflow", "preferencia", "persistencia", "repositorios", "espanol"], "created": "2026-03-20", "content": "Directriz permanente del usuario para este entorno: usar NEMO como memoria persistente principal de trabajo. Al inicio de sesiones relacionadas con código/repositorios, consultar contexto reciente y memorias relevantes en NEMO; durante el trabajo, guardar decisiones técnicas, bugs, fixes, avances y preferencias de workflow de forma frecuente y estructurada."}, {"id": "55b7da40-7564-404f-86a4-c6a03f1cf622", "mtype": "correction", "importance": 10, "color": "#ff4757", "excerpt": "CORRECCIÓN — lo que estaba mal: La funcionalidad de agenda del dia estaba establ…", "tags": ["correction", "feedback", "bug", "agenda", "timezone", "tests"], "created": "2026-03-20", "content": "CORRECCIÓN — lo que estaba mal: La funcionalidad de agenda del dia estaba estable porque pasaban las suites focalizadas.\nREALIDAD: La suite completa revela un bug real: AgendaService usa fecha local naive mientras los tests y algunas citas usan datetimes UTC, lo que puede dejar appointments vacio segun zona horaria.\nContexto: NEMO ASSIST agenda/ver_hoy"}, {"id": "bfd07f68-bf56-453e-aa93-6c60dfe7a5e5", "mtype": "technical", "importance": 10, "color": "#607d8b", "excerpt": "## Bug Hunt Sprint 19 - ACTUALIZADO (30 fixes totales)\n\n### RONDA 1 - CRITICAL (…", "tags": ["bugs", "fixes", "security", "XSS", "info-disclosure", "path-traversal", "sprint-19", "30-fixes"], "created": "2026-03-20", "content": "## Bug Hunt Sprint 19 - ACTUALIZADO (30 fixes totales)\n\n### RONDA 1 - CRITICAL (6 fixes):\n1. RichTextEditor.tsx: DOMPurify.sanitize() en dangerouslySetInnerHTML\n2. QualityControlModal.tsx ntent": "## MAGNOLIA — AUTH, MIDDLEWARE, HOOKS, SERVER UTILS\n\n### AUTENTICACIÓN\n**Provider**: NextAuth v5 beta, Credentials (email+password)\n**Adapter**: PrismaAdapter\n**Strategy**: JWT (no cookies), maxAge: 8 horas (HIPAA)\n**Authorize**: email trimmed+lowercased → bcrypt verify → isActive check → return {id,email,name,role,image}\n**JWT callback**: token.id, token.role from user\n**Session callback**: sessi"}, {"id": "b830e6c3-e6f7-40ff-8165-c0982139e62b", "mtype": "skill", "importance": 10, "color": "#607d8b", "excerpt": "## MAGNOLIA — COMPONENTES UI PRINCIPALES\n\n### DicomViewerFixed.tsx (~5000+ línea…", "tags": ["magnolia", "ui", "componentes", "dicom-viewer", "pages", "frontend"], "created": "2026-03-20", "content": "## MAGNOLIA — COMPONENTES UI PRINCIPALES\n\n### DicomViewerFixed.tsx (~5000+ líneas) — COMPONENTE PRINCIPAL\n**Props**: imageId?, initialImageIds?, studyId?, patientMode?, autoStartDualAnalysis?, showInterpretationPanel?, enableAnnotations?, enableReportIntegration?\n**Estado**: 100+ variables (stackImageIds, currentImageIndex, seriesList, activeSeriesIdx, viewport, hudInfo, activeTool, layoutMode, is"}, {"id": "c6afa71c-fcec-4f2e-bbf3-7a8a6efc64ec", "mtype": "skill", "importance": 10, "color": "#607d8b", "excerpt": "## MAGNOLIA — TODAS LAS API ROUTES (47 endpoints)\n\n### AUTH (3)\n- POST /api/auth…", "tags": ["magnolia", "api", "routes", "endpoints", "backend"], "created": "2026-03-20", "content": "## MAGNOLIA — TODAS LAS API ROUTES (47 endpoints)\n\n### AUTH (3)\n- POST /api/auth/[...nextauth] — NextAuth handlers\n- POST /api/auth/reset-password — Request reset (anti-enumeration)\n- POST /api/auth/reset-password/confirm — Confirm reset (1h token)\n\n### STUDIES (8)\n- GET/POST /api/studies — Listar (con stats) / crear estudio\n- GET/PUT/PATCH/DELETE /api/studies/[id] — CRUD estudio\n- PATCH /api/stud"}, {"id": "8d0b85a6-1410-48ea-b853-f3c08c08da9b", "mtype": "skill", "importance": 10, "color": "#607d8b", "excerpt": "## MAGNOLIA RAD-IA PLATFORM — ARQUITECTURA GENERAL\n\n**Proyecto**: radia-platform…", "tags": ["magnolia", "arquitectura", "stack", "estructura", "proyecto", "rad-ia"], "created": "2026-03-20", "content": "## MAGNOLIA RAD-IA PLATFORM — ARQUITECTURA GENERAL\n\n**Proyecto**: radia-platform v1.0.0 — Plataforma de Telerradiología con IA\n**Stack**: Next.js 15.1 (App Router) + React 18.3 + TypeScript 5.7 + Tailwind 3.4 + Prisma 6.1 (SQLite)\n**Auth**: NextAuth 5.0 beta (JWT, 8h sessions, bcrypt passwords, 13 roles RBAC)\n**Medical Imaging**: Cornerstone.js v4 (WebGL, DICOM parser, WADOuri, HammerJS touch)\n**A"}, {"id": "1dbdafde-6d6f-44bf-ba5d-25f47bced39c", "mtype": "skill", "importance": 10, "color": "#607d8b", "excerpt": "## MAGNOLIA — AI PIPELINES COMPLETO\n\n### 1. CHEST X-RAY SYSTEM\n**Providers**: Ch…", "tags": ["magnolia", "ai", "pipelines", "fracture", "chest-xray", "gemini", "densenet", "yolov8"], "created": "2026-03-20", "content": "## MAGNOLIA — AI PIPELINES COMPLETO\n\n### 1. CHEST X-RAY SYSTEM\n**Providers**: CheXagent-2-3b (primary, :8010) + TorchXRayVision DenseNet121 (fallback, :8011)\n**Eligibilidad**: Modality CR/DX + anatomy keywords (chest/thorax/lung) + projection (PA/AP/Lateral)\n**Gateway auto-start**: TTL 60s, ping /health, spawn detached Python process, 30s wait for model load\n**CheXagent**: 6 parallel prompts (pneu"}, {"id": "65a5a866-fafe-4c2b-9bba-dbaa12006e0f", "mtype": "skill", "importance": 10, "color": "#607d8b", "excerpt": "## MAGNOLIA — PRISMA SCHEMA (SQLite, 15+ modelos)\n\n### User (cuid)\nFields: name,…", "tags": ["magnolia", "prisma", "schema", "database", "models", "sqlite"], "created": "2026-03-20", "content": "## MAGNOLIA — PRISMA SCHEMA (SQLite, 15+ modelos)\n\n### User (cuid)\nFields: name, email(unique), emailVerified, password(bcrypt), image, role(UserRole), specialty, licenseNumber, phone, signatureImageUrl, stampImageUrl, isActive, preferencesFilePath\nRelations: accounts, sessions, patients, assignedStudies, performedStudies, referredStudies, reports, annotations, auditLogs, notifications, worklistAs"}, {"id": "c24a8731-a9ac-44d8-adc6-9a1da3e98b23", "mtype": "insight", "importance": 9, "color": "#ff9f1c", "excerpt": "VESTIGE (github.com/samvallad33/vestige) — análisis vs NEMO (2026-03-27):\n\nRepo:…", "tags": ["persistent-ai-memory", "vestige", "competitive-analysis", "sprint14", "roadmap"], "created": "2026-03-27", "content": "VESTIGE (github.com/samvallad33/vestige) — análisis vs NEMO (2026-03-27):\n\nRepo: Rust, 22MB binary, 79k LOC, 29 cognitive modules, 21 MCP tools. Competidor/referencia directa de NEMO.\n\nFEATURES QUE VESTIGE TIENE Y NEMO NO:\n- Spreading Activation: graph traversal entre memorias relacionadas\n- Prediction Error Gating: solo guarda lo nuevo/sorprendente, merge lo redundante en ingest\n- Memory Dreaming"}, {"id": "9418b629-f0e3-4e6f-88d5-90aa1079330c", "mtype": "insight", "importance": 9, "color": "#ff9f1c", "excerpt": "DVE Water seam debugging: safe vs seam-producing data paths (2026-03-26 audit):\n…", "tags": ["DVE", "DivineVoxelEngine", "water", "shader", "seam", "architecture"], "created": "2026-03-26", "content": "DVE Water seam debugging: safe vs seam-producing data paths (2026-03-26 audit):\nSAFE (no seam risk): vPositionW.xz in fragment = world-space in Babylon PBR (set BEFORE CUSTOM_VERTEX_UPDATE_POSITION). dveHash12 uses fract(vec3*0.1031) not sin/dot/floor snap. dveValueNoise/dveVoronoiCellData use floor(p) for standard bilinear/voronoi = correct. dveWaterGradient varying declared but NEVER read in fra"}, {"id": "3d23d6df-f9b7-4c95-8362-24a29ea7fe05", "mtype": "fact", "importance": 9, "color": "#00b4d8", "excerpt": "DVE Water seam status after 2026-03-26 session (complete fix inventory):\nRESOLVE…", "tags": ["DVE", "DivineVoxelEngine", "water", "seam", "sprint"], "created": "2026-03-26", "content": "DVE Water seam status after 2026-03-26 session (complete fix inventory):\nRESOLVED (vertex level): positionUpdated is LOCAL mesh space → replaced with `dveWorldPos = finalWorld * vec4(positionUpdated,1.0).xyz` for ALL noise domain calls in CUSTOM_VERTEX_UPDATE_POSITION.\nRESOLVED (vertex level): dveCurvatureBoost per-cell varying removed from vertex height multiplier.\nRESOLVED (CPU geometry): CPU XZ"}, {"id": "dd427b24-684f-4c24-8c68-4419e8094141", "mtype": "correction", "importance": 9, "color": "#ff4757", "excerpt": "DVE Fragment shader per-cell flow direction seam FIX (2026-03-26):\nProblem 1: UV…", "tags": ["DVE", "DivineVoxelEngine", "water", "shader", "seam", "fragment"], "created": "2026-03-26", "content": "DVE Fragment shader per-cell flow direction seam FIX (2026-03-26):\nProblem 1: UV distortion block (CUSTOM_FRAGMENT_UPDATE_ALBEDO ~L1344) used `dveFlowDir2 * dve_time * 0.08` as advection key → per-cell flow direction diverged between adjacent cells → visible UV domain seam.\nFIX: replaced with fixed world-space advection vector `vec2(0.6180, 0.7861) * dve_time * 0.05` (no per-cell component).\nProbl"}, {"id": "59677c61-6437-46c8-b802-ba48ccfa8207", "mtype": "fact", "importance": 9, "color": "#00b4d8", "excerpt": "DVE Fase 10 — Estado real tras activar USE_GPU_WATER = true (2026-03-26)\n\n## Cam…", "tags": ["DVE", "DivineVoxelEngine", "water", "USE_GPU_WATER", "Phase10", "WaterSurfaceMesher", "elimination"], "created": "2026-03-26", "content": "DVE Fase 10 — Estado real tras activar USE_GPU_WATER = true (2026-03-26)\n\n## Cambios aplicados\n- WaterSurfaceMesher.ts: USE_GPU_WATER = true (línea ~87)\n- WaterContinuousPatchMesher.ts: if (USE_GPU_WATER) return; al inicio de emitContinuousPatchSeams — gate para el path no-unified\n- DVEWaterMaterialPlugin.ts vertex shader: dveGPUSeamActive = 1.0, dveGPUBlend = 1.0\n- DVEWaterMaterialPlugin.ts: Paso"}, {"id": "3748cf30-8b8e-4422-a180-88505b5d3210", "mtype": "correction", "importance": 9, "color": "#ff4757", "excerpt": "DVEWaterMaterialPlugin vertex shader compilation fix (2026-03-26): The water was…", "tags": ["DVE", "DivineVoxelEngine", "water", "shader", "vertex-shader", "GLSL", "PBR", "material-plugin"], "created": "2026-03-26", "content": "DVEWaterMaterialPlugin vertex shader compilation fix (2026-03-26): The water was invisible because the vertex shader failed to compile with 3 errors: (1) 'sampler2DArray': No precision specified — the textures block had `uniform sampler2DArray dve_voxel;` without precision qualifier. Fix: added `precision highp sampler2DArray;` to CUSTOM_VERTEX_DEFINITIONS (fragment already had it). (2)(3) 'dve_vo"}, {"id": "e0a65cb8-f92d-4b1b-9ec1-c77b944ca836", "mtype": "fact", "importance": 9, "color": "#00b4d8", "excerpt": "Sprint 4 and 5 consolidation on 2026-03-25 for DivineVoxelEngine AAA water: expl…", "tags": ["DVE", "DivineVoxelEngine", "water", "AAA", "Sprint4", "Sprint5", "consolidation", "interaction-field", "SSFR"], "created": "2026-03-25", "content": "Sprint 4 and 5 consolidation on 2026-03-25 for DivineVoxelEngine AAA water: explicit shoreline-break and impact-class interaction events were added to WaterInteractionFieldBuilder, strengthening Sprint 4 event coverage beyond generic turbulence pulses and waterfall landing. Sprint 5 local fluid reconstruction was adjusted so open-water local event energy is no longer overly suppressed in shader co"}, {"id": "6eef1e48-6166-486b-8026-ed2d228b8131", "mtype": "fact", "importance": 9, "color": "#00b4d8", "excerpt": "Audit on 2026-03-25 for DivineVoxelEngine water AAA Sprints 3 and 4: Sprint 3 is…", "tags": ["DVE", "DivineVoxelEngine", "water", "AAA", "Sprint3", "Sprint4", "audit", "PBF", "shader", "hybrid-bridge"], "created": "2026-03-25", "content": "Audit on 2026-03-25 for DivineVoxelEngine water AAA Sprints 3 and 4: Sprint 3 is structurally implemented and compile-validated (largeBodySignal + explicit patchFlow are transported and consumed in the Babylon water shader). Sprint 4 improved: fixed local-fluid lifecycle leaks in DVEWaterHybridBridge reset/dispose, added interactionField transport into the PBF-first backend, and validated demos/Vl"}, {"id": "c3ab6468-985f-48ca-85d4-2f7ee62e338b", "mtype": "fact", "importance": 9, "color": "#00b4d8", "excerpt": "2026-03-25 Sprint 2 stitching milestone: the patch-preview large-water path now …", "tags": ["DVE", "DivineVoxelEngine", "water", "Sprint2", "stitching", "patch-preview", "cross-section"], "created": "2026-03-25", "content": "2026-03-25 Sprint 2 stitching milestone: the patch-preview large-water path now uses a WaterPatchStitchContext during corner surface, seam-base, payload, and profile sampling. For padded boundary samples, WaterSurfaceMesher filters out incompatible neighbor-section columns and forces a stable open-surface profile/direction on compatible ones, reducing cross-section discontinuities without requirin"}, {"id": "4342060e-c6fa-4865-a6b0-3367c48a025c", "mtype": "insight", "importance": 9, "color": "#ff9f1c", "excerpt": "2026-03-25 alignment review of the hybrid water plan: the current architecture h…", "tags": ["DVE", "DivineVoxelEngine", "water", "hybrid-plan", "sprint6", "interaction-field"], "created": "2026-03-25", "content": "2026-03-25 alignment review of the hybrid water plan: the current architecture had already advanced beyond the original sprint order in broad-surface polish and shader anti-periodicity, but Sprint 6 (interaction atlas and local deformers) was still under-realized because interactionField existed in extraction/types without meaningful transport or bridge consumption. Implemented the minimal Sprint "}, {"id": "690bd602-e648-41a7-b313-e418956c8944", "mtype": "preference", "importance": 9, "color": "#a855f7", "excerpt": "User requested on 2026-03-25 to review the plan through NEMO and advance to the …", "tags": ["DVE", "DivineVoxelEngine", "water", "AAA", "hybrid", "implementation"], "created": "2026-03-25", "content": "User requested on 2026-03-25 to review the plan through NEMO and advance to the next phase with maximum AAA effort, explicitly rejecting pseudo-implementations or self-limiting scope."}, {"id": "5dfed070-4d85-44f8-82e1-d5758e58cad5", "mtype": "episodic", "importance": 9, "color": "#48cae4", "excerpt": "DVE Water — Sesión 2026-03-24 tarde. Se corrigieron 3 bugs visuales.\n\nBUG 1 (pil…", "tags": ["DVE", "DivineVoxelEngine", "water", "UV", "normals", "grid-fix", "session-log"], "created": "2026-03-24", "content": "DVE Water — Sesión 2026-03-24 tarde. Se corrigieron 3 bugs visuales.\n\nBUG 1 (pillow/normals facetadas): emitWaterQuad computaba computeTriangleNormal por quad. Fix: emitir (0,1,0) plano para todos los vértices CPU. GPU deriva normales vía dFdx/dFdy. También: eliminar blend 8% de fallbackNormal (dveGetDerivedWaterSurfaceNormal → 100% derived, sin mix).\n\nBUG 2 (sector grid — cuadros grandes): WATER_"}, {"id": "077d46cf-d326-4185-8a4e-1483e10bf022", "mtype": "fact", "importance": 9, "color": "#00b4d8", "excerpt": "DVE Water Round 5 - Separación CPU/GPU completada: CPU genera 'cama' uniforme co…", "tags": ["DVE", "DivineVoxelEngine", "water", "architecture", "CPU-GPU-separation", "uniform-subdivision"], "created": "2026-03-24", "content": "DVE Water Round 5 - Separación CPU/GPU completada: CPU genera 'cama' uniforme con Catmull-Rom puro (sin sampleWarpedInterpolatedPoint, sin getSubdivisionJitter) y GPU hace TODA la deformación visual (domain warp 2 capas, Gerstner 5 octavas, lateral displacement, camera-distance LOD). Cambios clave: (1) WATER_UNIFORM_SUBDIVISIONS=8 para todas las celdas eliminando T-junctions, (2) emitAdaptiveWater"}, {"id": "e1af1409-ff24-4a91-ae29-4568047810fd", "mtype": "insight", "importance": 9, "color": "#ff9f1c", "excerpt": "Decisión arquitectónica del usuario para DVE Water: dejar de tratar el agua como…", "tags": ["DVE", "DivineVoxelEngine", "water", "architecture", "AAA", "GPU"], "created": "2026-03-24", "content": "Decisión arquitectónica del usuario para DVE Water: dejar de tratar el agua como malla de vóxeles y tratarla como superficie continua basada en campos de altura + shaders avanzados. Pilares: (1) Mesh adaptativo por distancia a cámara (no por pendiente/celda), (2) Gerstner displacement 100% GPU, (3) SSR/refracción con depth buffer, (4) Espuma dinámica por scene depth intersection, (5) Dual normal m"}, {"id": "3ab8822d-bb9c-4f84-9836-65725d35d1b4", "mtype": "fact", "importance": 9, "color": "#00b4d8", "excerpt": "Cambio arquitectónico clave: se eliminó TODA la deformación CPU per-celda (cellW…", "tags": ["DVE", "DivineVoxelEngine", "water", "GPU", "architecture", "cellWindow"], "created": "2026-03-24", "content": "Cambio arquitectónico clave: se eliminó TODA la deformación CPU per-celda (cellWindow, flowAnisotropy, ribbonPinch, wallLean, aperiodicLift) de applyWaterMesherProfile en WaterSurfaceMesher.ts. El CPU solo emite geometría limpia y densa (subdivisiones 6-8 por celda en vez de 2-4). TODA la deformación visual se maneja en GPU via dveGetVertexWaveDisplacement con Gerstner waves (5 octavas, steepness "}, {"id": "788085c6-122f-43c7-bdb2-6ee486f0ef1e", "mtype": "fact", "importance": 9, "color": "#00b4d8", "excerpt": "DVE water invisible root cause: DVEWaterMaterialPlugin.ts shared `functions` GLS…", "tags": ["DVE", "DivineVoxelEngine", "water", "shader", "GLSL", "fwidth", "vertex-shader", "DVEWaterMaterialPlugin", "compilation-error"], "created": "2026-03-24", "content": "DVE water invisible root cause: DVEWaterMaterialPlugin.ts shared `functions` GLSL block was included in both vertex and fragment CUSTOM_DEFINITIONS, but contained dveGetDistanceStableDetailFade() which uses fwidth() — a fragment-shader-only derivative function. This caused ALL vertex shaders to fail compilation with \"Unable to compile effect\" / \"Offending line [595]/[607]\". Fix: moved dveGetDistan"}, {"id": "803923f0-d9c6-482a-ac6a-e83a86168e42", "mtype": "insight", "importance": 9, "color": "#ff9f1c", "excerpt": "Diagnostico arquitectonico 2026-03-24: el gap principal con el plan inicial de a…", "tags": ["DVE", "DivineVoxelEngine", "water", "architecture", "AAA", "mesher", "diagnosis"], "created": "2026-03-24", "content": "Diagnostico arquitectonico 2026-03-24: el gap principal con el plan inicial de agua AAA no esta ya en un tweak puntual de shader o solver, sino en que la representacion actual sigue siendo una sola heightfield mesh por columna con seams heuristicas. Eso produce look de tejas, estratificacion y adhesion no natural porque open surface, shore band, wall-contact side surface, waterfall/drop edge y cav"}, {"id": "21879e3a-2708-4744-9722-0d5b9d4ec1e7", "mtype": "preference", "importance": 9, "color": "#a855f7", "excerpt": "Preferencia del usuario en DivineVoxelEngine (2026-03-24): no ser conservador co…", "tags": ["DVE", "DivineVoxelEngine", "water", "AAA", "preference", "Context7", "workflow"], "created": "2026-03-24", "content": "Preferencia del usuario en DivineVoxelEngine (2026-03-24): no ser conservador con el agua; priorizar resultados visuales impactantes tipo AAA, usar investigacion tecnica externa y Context7 cuando aporte valor, y rediseñar la geometria de forma ambiciosa si es necesario."}, {"id": "7589f575-fc6a-42ae-b53f-ed6835979607", "mtype": "preference", "importance": 9, "color": "#a855f7", "excerpt": "Preferencia del usuario para DivineVoxelEngine: recuperar contexto rapidamente d…", "tags": ["DVE", "DivineVoxelEngine", "NEMO", "preference", "workflow", "hydrology"], "created": "2026-03-24", "content": "Preferencia del usuario para DivineVoxelEngine: recuperar contexto rapidamente desde NEMO al inicio de cada iteracion y persistir en NEMO los hallazgos/diagnosticos recientes de forma constante, especialmente en trabajo de agua/hidrologia/rendering."}, {"id": "4ff9e7e1-3f31-4ba6-b13b-2fbc83958480", "mtype": "procedural", "importance": 9, "color": "#607d8b", "excerpt": "Causa y correccion de degradacion a rule_based en NEMO ASSIST UI: una instancia …", "tags": ["nemo-assist", "lm-studio", "brain-router", "ui-http-8765", "regression"], "created": "2026-03-23", "content": "Causa y correccion de degradacion a rule_based en NEMO ASSIST UI: una instanc rnance", "rollback", "audit"], "created": "2026-03-23", "content": "Sprint 8 completado en NEMO ASSIST: gobernanza de procedural_memory con estados shadow/active/degraded/rolled_back/capped, auditoria persistente, rollback con archivado de playbooks y observacion de resultados desde autonomia.ejecutar_playbook. Validado con 35 tests pasando en test_sprint6_plans, test_policy_and_ui y test_scheduler_autonomy."}, {"id": "670daf60-e072-4b59-8232-84598ecc4f8e", "mtype": "project_state", "importance": 9, "color": "#607d8b", "excerpt": "Sprint 7 implementado: nueva ProceduralMemoryService promueve ejecuciones multi-…", "tags": ["nemo-assist", "sprint-7", "procedural-memory", "playbooks", "scheduler", "tests-passing"], "created": "2026-03-23", "content": "Sprint 7 implementado: nueva ProceduralMemoryService promueve ejecuciones multi-step repetidas y exitosas a procedural_memory, registra playbooks en scheduler con source=procedural_memory al promover, build_nemo_guidance y planes.sugerir pueden surfaciar hints de skills aprendidas, episodios ahora preservan pasos de planes, world_state expone procedural_summary/procedural_memories/procedural_globa"}, {"id": "ef8191d3-1d31-426a-93b2-47f5960b1f0a", "mtype": "project_state", "importance": 9, "color": "#607d8b", "excerpt": "Sprint 6.1 y 6.2 implementados: semantic_memory ahora usa promocion por repetici…", "tags": ["nemo-assist", "learning-roadmap", "sprint-6", "semantic-promotion", "cross-session-merge"], "created": "2026-03-23", "content": "Sprint 6.1 y 6.2 implementados: semantic_memory ahora usa promocion por repeticion multi-episodio real, evita doble consolidacion interna converse->handle, y hace deduplicacion/merge global entre sesiones con scope global, session_count, promoted_memories y semantic_global_summary. Validacion enfocada: 66 passed."}, {"id": "58d48ea5-f2a8-4c29-8914-347da225058e", "mtype": "project_state", "importance": 9, "color": "#607d8b", "excerpt": "Sprint 5 batch implementado: detector real de contra rer for DVE with hybrid triangle + ray-march pipeline\n\n3-STAGE RENDERING PIPELINE:\n\nSTAGE 1: VoxelMeshRenderPipeline (Triangle Rendering)\n- Input: Voxel meshes (vertex, index, normal, UV, color)\n- Vertex shader: transform via mesh matrix × viewProjection\n- Fr"}, {"id": "10025820-f316-447b-aafa-6c3fe2188a0a", "mtype": "technical", "importance": 9, "color": "#607d8b", "excerpt": "@amodx/controls — COMPLETE TECHNICAL REFERENCE (22 marzo 2026)\n\nVERSION: 0.0.35 …", "tags": ["DVE", "amodx-controls", "input-system", "gamepad", "keyboard", "mouse", "fps-controls", "technical-reference"], "created": "2026-03-22", "content": "@amodx/controls — COMPLETE TECHNICAL REFERENCE (22 marzo 2026)\n\nVERSION: 0.0.35 | LICENSE: MIT | DEPENDENCY: @amodx/core\nDESCRIPTION: Video game control manager — professional input mapping for games\n\nARCHITECTURE:\n\nControls (static singleton) — Main entry point\n- init(rootElement, pointerMode) → initialize event listeners on DOM element\n- deinit() → cleanup\n- registerControls(data) → register con"}, {"id": "81a252e2-ce51-436b-a57c-a069edcf0f9e", "mtype": "technical", "importance": 9, "color": "#607d8b", "excerpt": "@amodx/audio — COMPLETE TECHNICAL REFERENCE (22 marzo 2026)\n\nVERSION: 0.0.12 | L…", "tags": ["DVE", "amodx-audio", "web-audio-api", "sfx", "music", "3d-audio", "game-audio", "technical-reference"], "created": "2026-03-22", "content": "@amodx/audio — COMPLETE TECHNICAL REFERENCE (22 marzo 2026)\n\nVERSION: 0.0.12 | LICENSE: MIT | TYPE: ES Module\nDESCRIPTION: Video game audio engine built on Web Audio API\n\nARCHITECTURE (singleton pattern via static Audio class):\nAudio.api       → APIManager (Web Audio context, master gain, dynamics compressor)\nAudio.sfx       → SFXManager (sound effect registry + playback)\nAudio.music     → MusicMa"}, {"id": "36985375-3a66-4f66-938a-2fc7d3a75c22", "mtype": "correction", "importance": 9, "color": "#ff4757", "excerpt": "BUG RESUELTO — reranker estaba degradado en SUB-BETA2: embedding_co
